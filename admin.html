<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard EMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<style>
#navbar{
  display: none;
}

:root{
  --bg:#0f172a; --card:#1e293b; --input:#334155; --primary:#dc2626;
  --text:#f8fafc; --muted:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:30px;}
.container{max-width:1200px;margin:auto;}
.card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:20px;}
h1{margin-bottom:8px;}
.subtitle{color:var(--muted);margin-bottom:20px;}
select,input{width:100%;padding:12px;border:none;border-radius:12px;background:var(--input);color:white;font-size:14px;margin-bottom:15px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:white;font-weight:700;cursor:pointer;margin-bottom:10px;}
button:hover{opacity:.9;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:20px 0;}
.stat{background:#111827;border-radius:18px;padding:22px;border:1px solid rgba(255,255,255,.08);transition:.2s;}
.stat:hover{transform:translateY(-2px);}
.stat-title{color:var(--muted);font-size:13px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;line-height:1.3;}
#topGaji{font-size:14px;line-height:1.5;}
#topGaji .top-name{font-size:14px;font-weight:600;}
#topGaji .top-salary{font-size:12px;color:#94a3b8;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#111827;padding:12px;text-align:left;}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);}
tr:hover{background:rgba(255,255,255,.03);}
a{color:#60a5fa;cursor:pointer;text-decoration:underline;}
.empty{text-align:center;color:var(--muted);padding:30px;}
.ts-control{background:var(--input)!important;color:white!important;border-radius:12px!important;padding:12px!important;}
.ts-control input{color:white!important;}
.ts-dropdown{background:var(--card)!important;color:white!important;border:none!important;}
.ts-dropdown .option{color:white!important;}
.ts-dropdown .active{background:var(--primary)!important;}
.hidden{display:none;}
.detail-row{background:#1a202c;}
</style>
</head>
<body>
<div class="container">

<!-- Navbar -->
<div id="navbar" style="display:flex;justify-content:center;margin-bottom:20px; display:none;">
  <div style="display:flex;gap:6px;background:#1e293b;padding:6px 12px;border-radius:12px;">
    <a href="admin.html" style="padding:8px 14px;color:#0f172a;background:#f8fafc;border-radius:12px;text-decoration:none;">Total Salary</a>
    <a href="attendanceadmin.html" style="padding:8px 14px;color:white;background:#334155;border-radius:12px;text-decoration:none;">Attendance Data</a>
    <a href="invoiceadmin.html" style="padding:8px 14px;color:white;background:#334155;border-radius:12px;text-decoration:none;">Invoice Data</a>
  </div>
</div>

<!-- Login card -->
<div class="card" id="loginCard">
  <h1>Admin Dashboard</h1>
  <div class="subtitle">Masukkan password admin</div>
  <input type="password" id="adminPassword" placeholder="Password Admin">
  <button onclick="checkLogin()">Masuk</button>
  <div id="loginStatus"></div>
</div>

<!-- Admin Panel -->
<div class="card hidden" id="adminPanel">
  <h1>Total Salary Dashboard EMSKK</h1>

<div class="stats">

  <!-- Card 1: Duty -->
  <div class="stat">
    <div class="stat-title">💰 Total Gaji Duty Minggu Ini</div>
    <div class="stat-value">
      <div style="font-size:18px;margin-bottom:6px">
        Total: <span id="totalDuty">0</span>
      </div>
    </div>
  </div>

  <!-- Card 2: Invoice -->
  <div class="stat">
    <div class="stat-title">💰 Total Gaji Invoice Minggu Ini</div>
    <div class="stat-value">
      <div style="font-size:18px;margin-bottom:6px">
        Total: <span id="totalInvoice">0</span>
      </div>
    </div>
  </div>

  <!-- Card 3: Top 3 -->
  <div class="stat">
    <div class="stat-title">🏆 Top 3 Total Salary Mingguan</div>
    <div class="stat-value" id="topGaji">-</div>
  </div>

</div>

  <!-- Filter minggu -->
  <div class="form-group">
    <label>Pilih Minggu</label>
    <select id="weekSelect"></select>
  </div>

<!-- Tabel Payroll -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Gaji Duty</th>
        <th>Gaji Invoice</th>
        <th>Total Gaji</th>
        <th>Paid</th>
      </tr>
    </thead>

    <tbody id="tbody">
      <tr>
        <td colspan="5" class="empty">Pilih minggu</td>
      </tr>
    </tbody>
  </table>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";
const LOGIN_KEY = "ems_admin_login";

let allSalaryData = [];

// =========================
// LOGIN ADMIN
// =========================
async function checkLogin(){
  const pw = document.getElementById("adminPassword").value.trim();
  document.getElementById("loginStatus").innerText = "⏳ Memeriksa password...";

  try{
    const res = await fetch(`${SCRIPT_URL}?action=verifyAdmin&password=${encodeURIComponent(pw)}`);
    const data = await res.json();

    if(data.success){
      sessionStorage.setItem(LOGIN_KEY, "true");

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");
      document.getElementById("navbar").style.display = "flex";

      loadData();
    } else {
      document.getElementById("loginStatus").innerText =
        "❌ Password salah, maksimal 3x salah maka IP akan di block";
    }

  }catch(e){
    document.getElementById("loginStatus").innerText =
      "❌ Server error, silahkan hubungi FINANCE";
  }
}

// =========================
// LOAD DATA (TOTAL SALARY)
// =========================
async function loadData(){

  const res = await fetch(SCRIPT_URL + "?action=getTotalSalary");
  const data = await res.json();

  allSalaryData = data;

  populateWeeks();
  renderTable();
}

// =========================
// PARSE WEEK SAFE
// =========================
function parseDateSafe(dateStr){
  const [y, m, d] = dateStr.split("|")[0].split("-");
  return new Date(Number(y), Number(m)-1, Number(d));
}

// =========================
// BUILD WEEK SELECT
// =========================

function populateWeeks(){
  const select = document.getElementById("weekSelect");
  select.innerHTML = "";

  const weeks = {};

  // =========================
  // BUILD UNIQUE WEEK LIST
  // =========================
  allSalaryData.forEach(i => {
    if (!i.week) return;
    weeks[i.week] = true;
  });

  const weekKeys = Object.keys(weeks);

  // =========================
  // TODAY (FOR AUTO SELECT)
  // =========================
  const today = new Date();
  today.setHours(0,0,0,0);

  let defaultIndex = 0;

  // =========================
  // CREATE OPTIONS
  // =========================
  weekKeys.forEach((key, index) => {
    const opt = document.createElement("option");
    opt.value = key;

    const [startStr, endStr] = key.split("|");

    const startDate = new Date(startStr);
    const endDate = new Date(endStr);

    // FORMAT LABEL
    opt.textContent = `${startStr} s/d ${endStr}`;

    // =========================
    // AUTO SELECT CURRENT WEEK
    // =========================
    if (today >= startDate && today <= endDate) {
      defaultIndex = index;
    }

    select.appendChild(opt);
  });

  // =========================
  // EVENT CHANGE
  // =========================
  select.addEventListener("change", renderTable);

  // =========================
  // AUTO SELECT + TRIGGER
  // =========================
  if (select.options.length > 0) {
    select.selectedIndex = defaultIndex;
    select.dispatchEvent(new Event("change"));
  }
}

// =========================
// RENDER DASHBOARD
// =========================
async function renderTable(){

  const select = document.getElementById("weekSelect");
  const week = select.value;
  if(!week) return;

  const filtered = allSalaryData.filter(x => x.week === week);

  // =========================
  // CARD 1 - DUTY
  // =========================
  const totalDuty = filtered.reduce((a,b)=>a + (b.duty || 0), 0);
  document.getElementById("totalDuty").innerText =
    totalDuty.toLocaleString("id-ID");

  // =========================
  // CARD 2 - INVOICE
  // =========================
  const totalInvoice = filtered.reduce((a,b)=>a + (b.invoice || 0), 0);
  document.getElementById("totalInvoice").innerText =
    totalInvoice.toLocaleString("id-ID");

  // =========================
  // CARD 3 - TOP 3
  // =========================
  const top3 = [...filtered]
    .sort((a,b)=>(b.duty + b.invoice) - (a.duty + a.invoice))
    .slice(0,3);

  document.getElementById("topGaji").innerHTML =
    top3.map((x,i)=>`
      <div style="margin-bottom:6px">
        ${["🥇","🥈","🥉"][i]} ${x.nama} - ${(x.duty + x.invoice).toLocaleString("id-ID")}
      </div>
    `).join("");

  // =========================
  // TABLE
  // =========================
  const tbody = document.getElementById("tbody");

  tbody.innerHTML = filtered.map(x=>{
    const total = x.duty + x.invoice;

    return `
      <tr>
        <td>${x.nama}</td>
        <td>${x.duty.toLocaleString("id-ID")}</td>
        <td>${x.invoice.toLocaleString("id-ID")}</td>
        <td><b>${total.toLocaleString("id-ID")}</b></td>
        <td>
          <input type="checkbox"
          onchange="markPaid('${x.nama}','${x.week}', this.checked)"
          ${x.paid === "PAID" ? "checked" : ""}>
        </td>
      </tr>
    `;
  }).join("");

}

// =========================
// AUTO LOGIN CHECK
// =========================
window.addEventListener("load", () => {
  const isLoggedIn = sessionStorage.getItem(LOGIN_KEY);

  if(isLoggedIn === "true"){
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    document.getElementById("navbar").style.display = "flex";
    loadData();
  }
});

function markPaid(nama, week, checked){
  fetch(SCRIPT_URL +
    "?action=updatePaidStatus" +
    "&nama=" + encodeURIComponent(nama) +
    "&week=" + encodeURIComponent(week) +
    "&status=" + (checked ? "PAID" : "UNPAID")
  );
}
</script>
</body>
</html>
