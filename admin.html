<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard EMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<style>
:root{
  --bg:#0f172a; --card:#1e293b; --input:#334155; --primary:#dc2626;
  --text:#f8fafc; --muted:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:30px;}
.container{max-width:1200px;margin:auto;}
.card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:20px;}
h1{margin-bottom:8px;}
.subtitle{color:var(--muted);margin-bottom:20px;}
select,input{width:100%;padding:12px;border:none;border-radius:12px;background:var(--input);color:white;font-size:14px;margin-bottom:15px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:white;font-weight:700;cursor:pointer;margin-bottom:10px;}
button:hover{opacity:.9;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:20px 0;}
.stat{background:#111827;border-radius:18px;padding:22px;border:1px solid rgba(255,255,255,.08);transition:.2s;}
.stat:hover{transform:translateY(-2px);}
.stat-title{color:var(--muted);font-size:13px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;line-height:1.3;}
#topGaji{font-size:14px;line-height:1.5;}
#topGaji .top-name{font-size:14px;font-weight:600;}
#topGaji .top-salary{font-size:12px;color:#94a3b8;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#111827;padding:12px;text-align:left;}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);}
tr:hover{background:rgba(255,255,255,.03);}
a{color:#60a5fa;cursor:pointer;text-decoration:underline;}
.empty{text-align:center;color:var(--muted);padding:30px;}
.ts-control{background:var(--input)!important;color:white!important;border-radius:12px!important;padding:12px!important;}
.ts-control input{color:white!important;}
.ts-dropdown{background:var(--card)!important;color:white!important;border:none!important;}
.ts-dropdown .option{color:white!important;}
.ts-dropdown .active{background:var(--primary)!important;}
.hidden{display:none;}
.detail-row{background:#1a202c;}
</style>
</head>
<body>
<div class="container">

<!-- Navbar -->
<div style="display:flex;justify-content:center;margin-bottom:20px;">
  <div style="display:flex;gap:6px;background:#1e293b;padding:6px 12px;border-radius:12px;">
    <a href="index.html" style="padding:8px 14px;color:white;background:#334155;border-radius:12px;text-decoration:none;">Input</a>
    <a href="dashboard.html" style="padding:8px 14px;color:white;background:#334155;border-radius:12px;text-decoration:none;">Dashboard</a>
    <a href="admin.html" style="padding:8px 14px;color:#0f172a;background:#f8fafc;border-radius:12px;text-decoration:none;">Admin</a>
  </div>
</div>

<!-- Login card -->
<div class="card" id="loginCard">
  <h1>Admin Dashboard</h1>
  <div class="subtitle">Masukkan password admin</div>
  <input type="password" id="adminPassword" placeholder="Password Admin">
  <button onclick="checkLogin()">Masuk</button>
  <div id="loginStatus"></div>
</div>

<!-- Admin Panel -->
<div class="card hidden" id="adminPanel">
  <h1>Admin Dashboard EMS</h1>

  <!-- 4 Stat Card -->
  <div class="stats">
    <div class="stat">
      <div class="stat-title">📄 Total Invoice Minggu Ini (Valid)</div>
      <div class="stat-value" id="jumlahInvoice">0</div>
    </div>
    <div class="stat">
      <div class="stat-title">💰 Total Invoice Bruto</div>
      <div class="stat-value" id="totalInvoiceBruto">0</div>
    </div>
    <div class="stat">
      <div class="stat-title">🏦 Total Gaji Minggu Ini</div>
      <div class="stat-value" id="totalGaji">0</div>
    </div>
    <div class="stat">
      <div class="stat-title">🏆 Top 3 Gaji Mingguan</div>
      <div class="stat-value" id="topGaji">-</div>
    </div>
  </div>

  <!-- Filter minggu -->
  <div class="form-group">
    <label>Pilih Minggu</label>
    <select id="weekSelect"></select>
  </div>

  <!-- Tabel Payroll -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Divisi</th>
          <th>Total Invoice</th>
          <th>Potongan</th>
          <th>Gaji Bersih</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">Pilih minggu</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";
const POTONGAN = { "PETINGGI":0.25,"PENGURUS":0.25,"SPESIALIS":0.3,"UMUM":0.4,"LAB":0.35,"OBGYN":0.35,"OPLAS":0.35 };
let allInvoices=[], weekRanges=[];

// Login Admin
async function checkLogin(){
  const pw = document.getElementById("adminPassword").value.trim();
  document.getElementById("loginStatus").innerText = "⏳ Memeriksa password...";
  try{
    const res = await fetch(`${SCRIPT_URL}?action=verifyAdmin&password=${encodeURIComponent(pw)}`);
    const data = await res.json();
    if(data.success){
      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");
      loadData();
    } else {
      document.getElementById("loginStatus").innerText = "❌ Password salah";
    }
  }catch(e){
    document.getElementById("loginStatus").innerText = "❌ Gagal memeriksa password";
  }
}

// Load invoice
async function loadData(){
  const res = await fetch(SCRIPT_URL+"?action=getInvoices");
  allInvoices = await res.json();
  populateWeeks();
  renderTable();
}

// Populate minggu (Minggu → Sabtu)
function populateWeeks(){
  const select = document.getElementById("weekSelect");
  const dates = allInvoices.map(i=>new Date(i["Tanggal Invoice"]));
  const weeks = {};
  dates.forEach(d=>{
    const start = new Date(d); start.setDate(d.getDate()-d.getDay()); start.setHours(0,0,0,0);
    const end = new Date(start); end.setDate(start.getDate()+6); end.setHours(23,59,59,999);
    const key = start.toISOString().split("T")[0]+"|"+end.toISOString().split("T")[0];
    if(!weeks[key]) weeks[key]={start,end};
  });
  weekRanges = Object.values(weeks);
  Object.keys(weeks).forEach(key=>{
    const opt=document.createElement("option");
    opt.value=key;
    const [s,e]=key.split("|");
    opt.textContent=s+" s/d "+e;
    select.appendChild(opt);
  });
  select.addEventListener("change", renderTable);
}

// Render tabel, stats, top 3, detail
function renderTable(){
  const select=document.getElementById("weekSelect");
  const key=select.value;
  if(!key) return;
  const [startStr,endStr]=key.split("|");
  const start=new Date(startStr);
  const end=new Date(endStr);

  // Filter invoice minggu ini
  const weekInvoices = allInvoices.filter(i=>{
    const t = new Date(i["Tanggal Invoice"]);
    return t>=start && t<=end;
  });

  // Invoice valid
  const validInvoices = weekInvoices.filter(i=>i.Status==="VALID");

  const payroll={};
  weekInvoices.forEach(i=>{
    const nama=i["Nama"];
    const divisi=i["Divisi"];
    const total=Number(i["Total"]||0);
    if(!payroll[nama]) payroll[nama]={divisi,total:0,gaji:0,invoices:[]};
    payroll[nama].invoices.push(i);
    if(i.Status==="VALID"){
      payroll[nama].total+=total;
      payroll[nama].gaji += total*(1-(POTONGAN[divisi]||0));
    }
  });

  // Update 4 card
  const totalInvoice = validInvoices.length;
  const totalBruto = validInvoices.reduce((a,b)=>a+Number(b.Total||0),0);
  const totalGaji = Object.values(payroll).reduce((a,b)=>a+b.gaji,0);

  document.getElementById("jumlahInvoice").innerText = totalInvoice + " Invoice";
  document.getElementById("totalInvoiceBruto").innerText = "$KK "+totalBruto.toLocaleString("id-ID");
  document.getElementById("totalGaji").innerText = "$KK "+totalGaji.toLocaleString("id-ID");

  // Top 3
  const top3 = Object.entries(payroll).sort((a,b)=>b[1].gaji-a[1].gaji).slice(0,3);
  document.getElementById("topGaji").innerHTML = top3.map((x,i)=>`
    <div style="margin-bottom:8px">
      <div class="top-name">${["🥇","🥈","🥉"][i]} ${x[0]}</div>
      <div class="top-salary">$KK ${x[1].gaji.toLocaleString("id-ID")}</div>
    </div>
  `).join("");

  // Render tabel payroll
  const tbody=document.getElementById("tbody");
  if(Object.keys(payroll).length===0){tbody.innerHTML='<tr><td colspan="6" class="empty">Belum ada invoice</td></tr>'; return;}
  tbody.innerHTML=Object.entries(payroll).map(([n,v])=>`
    <tr>
      <td>${n}</td>
      <td>${v.divisi}</td>
      <td>$KK ${v.total.toLocaleString("id-ID")}</td>
      <td>${((POTONGAN[v.divisi]||0)*100).toFixed(0)}%</td>
      <td>$KK ${v.gaji.toLocaleString("id-ID")}</td>
      <td><a onclick="toggleDetail('${n}')">Detail</a></td>
    </tr>
    <tr class="detail-row hidden" id="detail-${n.replace(/\s+/g,'')}">
      <td colspan="6">
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr><th>Tanggal</th><th>Invoice</th><th>Qty</th><th>Total</th><th>Link Bukti</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${v.invoices.map((inv,idx)=>`
            <tr>
              <td>${inv["Tanggal Invoice"]}</td>
              <td>${inv["Jenis Invoice"]}</td>
              <td>${inv["Qty"]}</td>
              <td>${inv.Status==="INVALID"?'<s>$KK '+Number(inv["Total"]).toLocaleString("id-ID")+'</s>':'$KK '+Number(inv["Total"]).toLocaleString("id-ID")}</td>
              <td><a href="${inv["Bukti"]}" target="_blank">Lihat Bukti</a></td>
              <td>
                <select onchange="updateStatus(${inv.RowIndex},this.value)">
                  <option value="PENDING" ${inv.Status==="PENDING"?'selected':''}>PENDING</option>
                  <option value="VALID" ${inv.Status==="VALID"?'selected':''}>VALID</option>
                  <option value="INVALID" ${inv.Status==="INVALID"?'selected':''}>INVALID</option>
                </select>
              </td>
            </tr>`).join("")}
          </tbody>
        </table>
      </td>
    </tr>
  `).join("");
}

function toggleDetail(n){
  const id="detail-"+n.replace(/\s+/g,'');
  const row=document.getElementById(id);
  if(row) row.classList.toggle("hidden");
}

function updateStatus(rowIndex,status){
  fetch(`${SCRIPT_URL}?action=updateStatus&rowIndex=${rowIndex}&status=${status}`)
    .then(res=>res.json())
    .then(data=>{if(data.success) renderTable();});
}
</script>
</body>
</html>
