<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS ADMIN DASHBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#f59e0b;
}

*{font-family:Inter;box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

.topnav{
  position:fixed;
  top:0;left:0;right:0;
  padding:12px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
}

.container{
  max-width:1200px;
  margin:80px auto;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  background:#111827;
  color:#fff;
  border:none;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:10px 14px;
  background:#111827;
  border-radius:10px;
  cursor:pointer;
}

.tab.active{
  background:#1f2937;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:13px;
}

th{color:var(--muted);text-align:left}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.valid{background:var(--green);color:#000}
.invalid{background:var(--red);color:#fff}
.edit{background:var(--yellow);color:#000}

/* MODAL */
.modal{
  position:fixed;
  top:25%;
  left:35%;
  background:#111827;
  padding:20px;
  border-radius:12px;
  display:none;
  z-index:999;
}
</style>
</head>

<body>

<div class="topnav">
  <div>EMS ADMIN DASHBOARD</div>
</div>

<div class="container">

<!-- FILTER -->
<div class="card">
  <h3>Filter Data</h3>

  <label>Minggu</label>
  <select id="weekFilter"></select>

  <label>Status</label>
  <select id="statusFilter">
    <option value="PENDING">PENDING</option>
    <option value="VALID">VALID</option>
    <option value="INVALID">INVALID</option>
  </select>
</div>

<!-- TABS -->
<div class="card">
<div class="tabs">
  <div class="tab active" onclick="showTab('att')">Attendance</div>
  <div class="tab" onclick="showTab('inv')">Invoice</div>
  <div class="tab" onclick="showTab('pay')">Payroll</div>
</div>

<!-- ATTENDANCE -->
<div id="attTab">
<table>
<thead>
<tr>
  <th>Nama</th>
  <th>Total Jam Valid</th>
  <th>Total Pending Duty</th>
  <th>Detail</th>
</tr>
</thead>
<tbody id="attBody"></tbody>
</table>
</div>

<!-- INVOICE -->
<div id="invTab" style="display:none;">
<table>
<thead>
<tr>
  <th>Nama</th><th>Total</th><th>Status</th><th>Aksi</th>
</tr>
</thead>
<tbody id="invBody"></tbody>
</table>
</div>

<!-- PAYROLL -->
<div id="payTab" style="display:none;">
<table>
<thead>
<tr>
  <th>Nama</th><th>Invoice</th><th>Attendance</th><th>Total</th><th>Status</th>
</tr>
</thead>
<tbody id="payBody"></tbody>
</table>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <h3>Edit Attendance</h3>
  <input type="datetime-local" id="startEdit">
  <input type="datetime-local" id="finishEdit">
  <button onclick="saveEdit()">Save</button>
  <button onclick="closeModal()">Close</button>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let attendanceData=[];
let editRow=null;

// ================= TAB
function showTab(t){
  document.getElementById("attTab").style.display=t==="att"?"block":"none";
  document.getElementById("invTab").style.display=t==="inv"?"block":"none";
  document.getElementById("payTab").style.display=t==="pay"?"block":"none";
}

// ================= WEEK AUTO (FIX AMAN)
function loadWeeks(){
  const sel=document.getElementById("weekFilter");
  sel.innerHTML="";

  const now=new Date();

  for(let i=-2;i<=2;i++){
    const d=new Date();
    d.setDate(now.getDate()+i*7);

    const start=new Date(d);
    start.setDate(d.getDate()-d.getDay());

    const end=new Date(start);
    end.setDate(start.getDate()+6);

    const format=d=>d.toISOString().split("T")[0];

    const opt=document.createElement("option");
    opt.value=start.toISOString();
    opt.textContent=`${format(start)} s/d ${format(end)}`;

    sel.appendChild(opt);

    if(i===0) sel.value=start.toISOString();
  }
}

// ================= LOAD DATA
async function load(){

  const att=await fetch(SCRIPT_URL+"?action=getAttendanceLog").then(r=>r.json());
  const inv=await fetch(SCRIPT_URL+"?action=getInvoices").then(r=>r.json());
  const pay=await fetch(SCRIPT_URL+"?action=getPayrollSummary").then(r=>r.json());

  attendanceData=att;

  renderAttendance();
  renderInvoice(inv);
  renderPayroll(pay);
}

// ================= FILTER CORE (AMAN)
function filter(data){

  const status=document.getElementById("statusFilter").value;
  const week=document.getElementById("weekFilter").value;

  let res=data;

  if(status){
    res=res.filter(d=>d.Status===status);
  }

  if(week){
    const start=new Date(week);
    const end=new Date(start);
    end.setDate(start.getDate()+6);

    res=res.filter(d=>{
      const t=new Date(d.Start);
      return t>=start && t<=end;
    });
  }

  return res;
}

// ================= GROUP ATTENDANCE (CORE UPGRADE)
function formatHM(decimal){
  const h = Math.floor(decimal);
  const m = Math.round((decimal - h) * 60);
  return `${h}h ${m}m`;
}

function parseDurasi(str){
  const h = (str.match(/(\d+)\s*h/)||[0,0])[1];
  const m = (str.match(/(\d+)\s*m/)||[0,0])[1];
  const s = (str.match(/(\d+)\s*s/)||[0,0])[1];

  return (+h) + (+m/60) + (+s/3600);
}

function groupAttendance(data){

  const map={};

  data.forEach(d=>{

    if(!map[d.Nama]){
      map[d.Nama]={
        nama:d.Nama,
        totalValid:0,
        totalPending:0,
        items:[]
      };
    }

    const dur = parseDurasi(d.Durasi || "0h 0m 0s");

    if(d.Status==="VALID") map[d.Nama].totalValid+=dur;
    if(d.Status==="PENDING") map[d.Nama].totalPending+=1;

    map[d.Nama].items.push(d);
  });

  return Object.values(map);
}

// ================= ATTENDANCE RENDER (UPGRADE SAFE)
function renderAttendance(){

  const body=document.getElementById("attBody");
  const grouped=groupAttendance(filter(attendanceData));

  body.innerHTML=grouped.map((u,i)=>`

    <tr>
      <td>${u.nama}</td>
	  <td>${formatHM(u.totalValid)}</td>
      <td>${u.totalPending}</td>
      <td><button onclick="toggle('${u.nama}')">Detail</button></td>
    </tr>

    <tr id="d-${u.nama.replace(/\s/g,'_')}" style="display:none">
      <td colspan="4">
        <table style="width:100%">
          <tr>
            <th>Start</th><th>Finish</th><th>Durasi</th><th>Status</th><th>Aksi</th>
          </tr>

          ${u.items.map(it=>`
            <tr>
              <td>${it.Start}</td>
              <td>${it.Finish}</td>
              <td>${it.Durasi}</td>
              <td>${it.Status}</td>
              <td>
                <button class="valid" onclick="updateStatus(${it.RowIndex},'VALID')">V</button>
                <button class="invalid" onclick="updateStatus(${it.RowIndex},'INVALID')">X</button>
				<button class="edit" onclick="openEdit(${it.RowIndex},'${it.Start}','${it.Finish}')">EDIT</button>
              </td>
            </tr>
          `).join("")}

        </table>
      </td>
    </tr>

  `).join("");
}

// ================= DETAIL TOGGLE
function toggle(name){
  const id = "d-" + name.replace(/\s/g,'_');
  const el = document.getElementById(id);
  el.style.display = el.style.display==="none"?"table-row":"none";
}

// ================= INVOICE (UNCHANGED SAFE)
function renderInvoice(inv){
  document.getElementById("invBody").innerHTML=
  inv.map(r=>`
    <tr>
      <td>${r.Nama}</td>
      <td>${r.Total}</td>
      <td>${r.Status}</td>
      <td>
        <button class="valid" onclick="inv(${r.RowIndex},'VALID')">✔</button>
        <button class="invalid" onclick="inv(${r.RowIndex},'INVALID')">✖</button>
      </td>
    </tr>
  `).join("");
}

// ================= PAYROLL (UNCHANGED SAFE)
function renderPayroll(pay){
  document.getElementById("payBody").innerHTML=
  pay.map(r=>`
    <tr>
      <td>${r.nama}</td>
      <td>${r.invoicePay}</td>
      <td>${r.attendancePay}</td>
      <td>${r.totalSalary}</td>
      <td><button class="valid">PAID</button></td>
    </tr>
  `).join("");
}

// ================= ACTIONS
function updateLocal(row, val){

  const idx = attendanceData.findIndex(d => d.RowIndex === row);

  if(idx !== -1){
    attendanceData[idx].Status = val;
  }

  renderAttendance();
}

async function inv(row,val){
  await fetch(SCRIPT_URL+`?action=updateStatus&rowIndex=${row}&status=${val}`);
  load();
}

function openEdit(row, start, finish){
  editRow = row;

  document.getElementById("startEdit").value =
    start.slice(0,16).replace(" ","T");

  document.getElementById("finishEdit").value =
    finish.slice(0,16).replace(" ","T");

  document.getElementById("modal").style.display = "block";
}

async function saveEdit(){

  const start = document.getElementById("startEdit").value;
  const finish = document.getElementById("finishEdit").value;

  await fetch(SCRIPT_URL +
    `?action=updateAttendanceTime&rowIndex=${editRow}&start=${start}&finish=${finish}`
  );

  const idx = attendanceData.findIndex(d => d.RowIndex === editRow);

  if(idx !== -1){
    attendanceData[idx].Start = start;
    attendanceData[idx].Finish = finish;
  }

  document.getElementById("modal").style.display = "none";

  renderAttendance(); // 🔥 NO LOAD()
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("startEdit").value = "";
  document.getElementById("finishEdit").value = "";
  editRow = null;
}

document.getElementById("weekFilter").addEventListener("change", renderAttendance);
document.getElementById("statusFilter").addEventListener("change", renderAttendance);

// ================= INIT
loadWeeks();
load();

</script>

</body>
</html>
