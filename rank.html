<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EMSKK Duty Ranking</title>

<link rel="icon" href="logo.png" type="image/png">
<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --input:#334155;
  --primary:#dc2626;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  padding:30px;
}

body::after{
  content:"system by Samuel";
  position:fixed;
  bottom:10px;
  left:12px;
  font-size:10px;
  color:rgba(148,163,184,0.25);
  letter-spacing:0.5px;
  pointer-events:none;
  z-index:9999;
}

.container{
  max-width:1200px;
  margin:auto;
}

h2{
  margin-bottom:20px;
  font-size:24px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
  background:rgba(255,255,255,0.03);
  padding:12px;
  border-radius:16px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#334155;
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
  background:#475569;
}

button.active{
  background:var(--primary);
  font-weight:700;
}

select{
  padding:10px;
  border-radius:12px;
  background:var(--input);
  color:white;
  border:none;
}

.table-wrap{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#111827;
  padding:14px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

td{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  text-align:center;
}

td:nth-child(2){
  text-align:left;
}

tr:hover td{
  background:rgba(255,255,255,0.03);
}

.rank{
  color:#fbbf24;
  font-weight:700;
}

/* EMPTY */
.empty{
  text-align:center;
  color:var(--muted);
  padding:30px;
}

.section-title{
  margin:25px 0 10px;
  font-size:16px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h2>🏆 EMSKK Duty Ranking</h2>

<div class="topbar">
  <button id="weeklyBtn" class="active" onclick="setMode('weekly')">Weekly</button>
  <button id="monthlyBtn" onclick="setMode('monthly')">Monthly</button>

  <select id="periodSelect" onchange="render()"></select>

  <button onclick="loadData()">Refresh</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Rank</th>
<th>Nama</th>
<th>Total Jam</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="section-title">BELUM PERNAH DUTY</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
</tr>
</thead>
<tbody id="neverDutyTable"></tbody>
</table>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let allData = [];
let masterData = [];
let mode = "weekly";
let periods = [];
let selectedPeriod = "";

function parseDate(str){
  if(!str) return null;
  return new Date(str.replace(" ","T"));
}

function getWeekKey(d){
  const local = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const ws = new Date(local);
  ws.setDate(local.getDate() - local.getDay());
  ws.setHours(0,0,0,0);

  const we = new Date(ws);
  we.setDate(ws.getDate() + 6);
  we.setHours(23,59,59,999);

  const fmt = (x)=>
    `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;

  return `${fmt(ws)}|${fmt(we)}`;
}

function getDurationHours(s,f){
  const a=parseDate(s);
  const b=parseDate(f);
  if(!a||!b) return 0;
  return (b-a)/(1000*60*60);
}

function formatHours(h){
  const m=Math.floor(h*60);
  return `${Math.floor(m/60)}h ${m%60}m`;
}

async function loadData(){

  const res = await fetch(SCRIPT_URL + "?action=getAttendanceLog");
  allData = await res.json() || [];

  const res2 = await fetch(SCRIPT_URL + "?action=getEMSList");
  const raw = await res2.json() || [];

  masterData = raw
    .map(x => {
      if (!x) return "";
      if (typeof x === "string") return x;
      if (x.nama) return x.nama;
      return "";
    })
    .map(n => String(n).trim())
    .filter(n =>
      n &&
      n !== "undefined" &&
      n !== "-" &&
      !/^\d+(\.\d+)?$/.test(n)
    );

  buildPeriods();
  render();
}

function buildPeriods(){
  const weekMap = {};
  const monthSet = new Set();

  allData.forEach(r=>{
    if(!r.Start || r.Status !== "VALID") return;

    const d=parseDate(r.Start);
    if(!d) return;

    weekMap[getWeekKey(d)] = true;

    const local = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    monthSet.add(`${local.getFullYear()}-${String(local.getMonth()+1).padStart(2,'0')}`);
  });

  periods = mode==="weekly"
    ? Object.keys(weekMap).sort().reverse()
    : Array.from(monthSet).sort().reverse();

  const sel=document.getElementById("periodSelect");
  sel.innerHTML="";

  periods.forEach(p=>{
    const o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    sel.appendChild(o);
  });

  if(periods.length){
    selectedPeriod = periods[0];
    sel.value = selectedPeriod;
  }
}

function render(){
  selectedPeriod = document.getElementById("periodSelect").value;

  const map = {};

  allData.forEach(r => {

    if (!r.Start || r.Status !== "VALID") return;

    const d = parseDate(r.Start);
    if (!d) return;

    let match = false;

    if (mode === "weekly") {
      match = getWeekKey(d) === selectedPeriod;
    } else {
      const local = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const mKey = `${local.getFullYear()}-${String(local.getMonth()+1).padStart(2,'0')}`;
      match = mKey === selectedPeriod;
    }

    if (!match) return;

    const h = getDurationHours(r.Start, r.Finish);
    const n = String(r.Nama || "").trim();

    if (!n) return;

    if (!map[n]) map[n] = 0;
    map[n] += h;
  });

  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);

  const tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  sorted.forEach((x, i) => {
    tb.innerHTML += `
      <tr>
        <td class="rank">${i + 1}</td>
        <td>${x[0]}</td>
        <td>${formatHours(x[1])}</td>
      </tr>
    `;
  });

  const dutySet = new Set(
    sorted.map(x => x[0].trim().toLowerCase())
  );

  const never = masterData
    .filter(n => n && n.trim())
    .filter(n => !/^\d+(\.\d+)?$/.test(n))
    .filter(n => n.toLowerCase() !== "nama")
    .filter(n => !dutySet.has(n.trim().toLowerCase()));

  const tb2 = document.getElementById("neverDutyTable");
  tb2.innerHTML = "";

  never.forEach((u, i) => {
    tb2.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${u}</td>
      </tr>
    `;
  });
}

function setMode(m){
  mode=m;
  document.getElementById("weeklyBtn").classList.toggle("active",m==="weekly");
  document.getElementById("monthlyBtn").classList.toggle("active",m==="monthly");
  buildPeriods();
  render();
}

loadData();
</script>
</body>
</html>
