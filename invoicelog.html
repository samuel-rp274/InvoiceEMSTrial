<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Invoice Overview</title>

<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
  background: #030712;
  color: #f8fafc;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 100px 20px 40px 20px;
  position: relative;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
.blob.one { background: #3b82f6; top: -150px; left: -150px; }
.blob.two { background: #22c55e; bottom: -150px; right: -150px; }

.topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  z-index: 999;
}

.topnav a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}

.topnav a:hover {
  color: #38bdf8;
}

.topnav .title {
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.container {
  width: 100%;
  max-width: 1000px;
  z-index: 2;
}

.card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 36px;
  width: 100%;
  position: relative;
}

.card + .card {
  margin-top: 24px;
}

.card::before {
  content: "";
  position: absolute;
  top: 10%;
  left: 0;
  width: 3px;
  height: 80%;
  border-radius: 4px;
  background: #38bdf8;
  box-shadow: 0 0 15px #38bdf8;
}

.card-header-icon {
  width: 56px;
  height: 56px;
  background: rgba(56, 189, 248, 0.15);
  color: #38bdf8;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: inset 0 0 12px rgba(56, 189, 248, 0.2);
}

h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
h1 span.white { color: #ffffff; }
h1 span.gradient {
  background: linear-gradient(to right, #38bdf8, #0ea5e9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 24px;
  line-height: 1.4;
}

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-top: 24px;
}

.stat {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.stat-title {
    color: #64748b;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-value {
    font-size: 22px;
    font-weight: 800;
    margin-top: 8px;
    color: #f8fafc;
}

#totalGaji {
    color: #38bdf8;
}

#uploadTerakhir {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.5;
  color: #cbd5e1;
}

.table-responsive {
    width: 100%;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 8px;
}

th {
    background: rgba(15, 23, 42, 0.7);
    padding: 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

td {
    padding: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    color: #cbd5e1;
    font-size: 14px;
    white-space: nowrap;
}

tr:last-child td {
    border-bottom: none;
}

tr:hover td {
    background: rgba(255, 255, 255, 0.02);
    color: #ffffff;
}

table a {
    color: #38bdf8;
    text-decoration: none;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
}

table a:hover {
    color: #0ea5e9;
    text-decoration: underline;
}

.empty {
    text-align: center;
    color: #64748b;
    padding: 48px !important;
    font-size: 14px;
    font-weight: 500;
}

.ts-wrapper.single .ts-control {
    background: rgba(15, 23, 42, 0.6) !important;
    border: 1px solid rgba(255, 255, 255, 0.04) !important;
    color: white !important;
    border-radius: 14px !important;
    padding: 14px 16px !important;
    font-size: 14px !important;
}
.ts-wrapper.focus .ts-control {
    border-color: rgba(56, 189, 248, 0.4) !important;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.1) !important;
}
.ts-control input { color: white !important; font-size: 14px !important; }
.ts-control input::placeholder { color: #64748b !important; }
.ts-dropdown {
    background: #0f172a !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    color: white !important;
    border-radius: 14px !important;
    margin-top: 6px !important;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
    overflow: hidden !important;
    z-index: 9999 !important;
}
.ts-dropdown .option { padding: 12px 16px !important; font-size: 14px !important; color: white !important; }
.ts-dropdown .active { background: rgba(56, 189, 248, 0.15) !important; color: #38bdf8 !important; }

.footer-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 32px;
  margin-bottom: 16px;
}
.footer-line {
  height: 1px;
  width: 120px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
}
.footer-logo {
  color: #94a3b8;
  width: 16px;
  height: 16px;
  opacity: 0.3;
}
.credits {
  text-align: center;
  font-size: 12px;
  color: #64748b;
}
.credits a {
  color: #3b82f6;
  text-decoration: none;
}
</style>
</head>

<body>
<div class="blob one"></div>
<div class="blob two"></div>

<div class="topnav">
  <a href="index.html"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">

<div class="card">
  <div class="card-header-icon">
    <i data-lucide="pie-chart"></i>
  </div>
  
  <h1><span class="white">EMSKK</span> <span class="gradient">INVOICE OVERVIEW</span></h1>
  <div class="subtitle">Weekly invoice submission summary</div>

  <div class="form-group">
    <select id="searchEMS" placeholder="Cari nama EMS..."></select>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-title">Jumlah Invoice Minggu Ini</div>
      <div class="stat-value" id="jumlahInvoice">0</div>
    </div>
    <div class="stat">
      <div class="stat-title">Total Invoice Minggu Ini</div>
      <div class="stat-value" id="totalGaji">$KK 0</div>
    </div>
    <div class="stat">
      <div class="stat-title">Upload Terakhir</div>
      <div class="stat-value" id="uploadTerakhir">-</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Invoice</th>
          <th>Qty</th>
          <th>Total</th>
          <th>Bukti</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td colspan="5" class="empty">Pilih EMS terlebih dahulu</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="footer-divider">
  <div class="footer-line"></div>
  <i data-lucide="aperture" class="footer-logo"></i>
  <div class="footer-line"></div>
</div>
<div class="credits">System by <a href="#">Samuel</a></div>

</div>

<script>
lucide.createIcons();

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let allInvoices = [];
let tomSelectInstance = null;
const CACHE_KEY_INV = "invoice_cache_v1";
const CACHE_TTL = 1000 * 60 * 8;

function isCacheValid(time){
  return (Date.now() - time) < CACHE_TTL;
}

async function loadEMS(){
    const res = await fetch(SCRIPT_URL+"?action=getEMS");
    const data = await res.json();
    const select = document.getElementById("searchEMS");

    data.forEach(item=>{
        const opt = document.createElement("option");
        opt.value = item.nama;
        opt.textContent = item.nama;
        select.appendChild(opt);
    });

    tomSelectInstance = new TomSelect("#searchEMS",{
        create:false,
        sortField:{field:"text",direction:"asc"},
        placeholder:"Cari nama EMS...",
		dropdownParent: "body",
        onChange: function(value){
          localStorage.setItem("ems_name", value);
          requestAnimationFrame(() => renderTable());
        }
    });

    const saved = localStorage.getItem("ems_name");

    if (saved) {
      setTimeout(() => {
        tomSelectInstance.setValue(saved);
        requestAnimationFrame(() => renderTable());
      }, 100);
    }
    loadData();
}

async function loadData(){
    const cached = localStorage.getItem(CACHE_KEY_INV);

    if(cached){
        let parsed = null;
        try {
            parsed = JSON.parse(cached);
        } catch(e){
            localStorage.removeItem(CACHE_KEY_INV);
        }

        if(parsed && isCacheValid(parsed.time)){
            allInvoices = parsed.data || [];
            requestAnimationFrame(() => renderTable());
            refreshFromServer();
            return;
        }
    }

    try {
        const res = await fetch(SCRIPT_URL+"?action=getInvoices");
        const data = await res.json();
        allInvoices = data || [];
        localStorage.setItem(CACHE_KEY_INV, JSON.stringify({
            data: allInvoices,
            time: Date.now()
        }));
    } catch(e){
        console.error("Gagal fetch invoice:", e);
        allInvoices = [];
    }
    requestAnimationFrame(() => renderTable());
}

async function refreshFromServer(){
    try{
        const res = await fetch(SCRIPT_URL+"?action=getInvoices");
        const fresh = await res.json();
        allInvoices = fresh;
        localStorage.setItem(CACHE_KEY_INV, JSON.stringify({
            data: fresh,
            time: Date.now()
        }));
        requestAnimationFrame(() => renderTable());
    } catch(e){
        console.log("sync gagal, pakai cache");
    }
}

function getWeekRange(date){
    const d = new Date(date);
    const day = d.getDay();
    const start = new Date(d);
    start.setDate(d.getDate() - day);
    start.setHours(0,0,0,0);

    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23,59,59,999);

    return { start, end };
}

function safeDate(val){
  return new Date(String(val || "").split(" ")[0]);
}

function renderTable(){
    if(!allInvoices || allInvoices.length === 0) return;
	
	const name = (tomSelectInstance?.getValue() || "").toLowerCase().trim();

    if(!name){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5" class="empty">Pilih EMS terlebih dahulu</td></tr>`;
        return;
    }

    const filtered = allInvoices.filter(i =>
	 (i["Nama"] || "").toLowerCase().trim() === name
	);
	
    if(filtered.length===0){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5" class="empty">Belum ada invoice</td></tr>`;
        return;
    }
	
	const today = new Date();
	const { start, end } = getWeekRange(today);
	
    const weekInvoices = filtered.filter(i => {
        const t = safeDate(i["Tanggal Invoice"]);
        return t >= start && t <= end;
    });

    document.getElementById("jumlahInvoice").innerText = weekInvoices.length;

    document.getElementById("totalGaji").innerText =
    "$KK " + weekInvoices
        .reduce((a,b)=>a+(Number(b["Total"])||0),0)
        .toLocaleString("id-ID");
	
	const last = filtered
	 .filter(i => i["Tanggal Invoice"])
	 .sort((a, b) =>
	  safeDate(b["Tanggal Invoice"]) - safeDate(a["Tanggal Invoice"])
	 )[0];
	
	document.getElementById("uploadTerakhir").innerText =
	last
	? last["Tanggal Invoice"] + " - " + last["Jenis Invoice"]
	: "-";
	
	document.getElementById("tbody").innerHTML = weekInvoices.map(i=>`
        <tr>
			<td>${safeDate(i["Tanggal Invoice"]).toLocaleDateString("id-ID")}</td>
			<td>${i["Jenis Invoice"]}</td>
            <td>${i["Qty"]}</td>
            <td>$KK ${Number(i["Total"]).toLocaleString("id-ID")}</td>
            <td><a href="${i["Bukti"]}" target="_blank"><i data-lucide="external-link" style="width: 14px; height: 14px;"></i> Lihat</a></td>
        </tr>
    `).join("");
    
    lucide.createIcons();
}
document.addEventListener("DOMContentLoaded",loadEMS);
</script>
</body>
</html>
