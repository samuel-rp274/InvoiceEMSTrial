<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Invoice Overview</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --input:#334155;
    --primary:#dc2626;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Inter,sans-serif;
}

body{
  background:#0b1220;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 16px;
  overflow-y:auto;
}

.container{
  width:100%;
  max-width:1100px;
  margin:80px auto 0;
  z-index:2;
  isolation: isolate;
}

.form-group{
  position: relative;
  z-index: 10;
}

.card{
  background:rgba(255,255,255,0.06);
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:24px;
  position: relative;
  z-index: 1;
  overflow: visible;
}

.card + .card{
  margin-top:20px;
}

.card table{
  position: relative;
  z-index: 0;
}

h1{margin-bottom:8px;}
.subtitle{color:var(--muted);margin-bottom:20px;}

select,input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:var(--input);
    color:white;
    font-size:14px;
    margin-bottom:15px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.stat{
    background:#111827;
    border-radius:15px;
    padding:20px;
}

.stat-title{color:var(--muted);font-size:13px;}
.stat-value{font-size:24px;font-weight:bold;margin-top:8px;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
	border-spacing:0 6px;
}

th{
    background:#111827;
    padding:12px;
    text-align:left;
}

th, td{
  white-space:nowrap;
}

td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,.08);
}

tr:hover{background:rgba(255,255,255,.03);}
a{color:#60a5fa;}
.empty{text-align:center;color:var(--muted);padding:30px;}

.ts-control{background:var(--input)!important;color:white!important;border-radius:12px!important;padding:12px!important;}
.ts-control input{color:white!important;}
.ts-dropdown{
  background:var(--card)!important;
  color:white!important;
  border:none!important;
  position: absolute !important;
  z-index: 9999 !important;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
 }
.ts-dropdown .option{color:white!important;}
.ts-dropdown .active{background:var(--primary)!important;}
.ts-wrapper{
  position: relative;
  z-index: 5000;
}

.blob{
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
  animation:float 8s infinite ease-in-out;
}

.blob.one{
  background:#38bdf8;
  top:-100px;
  left:-100px;
}

.blob.two{
  background:#22c55e;
  bottom:-120px;
  right:-120px;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(30px)}
}

.topnav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:999;
}

.topnav a{
  color:#cbd5e1;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.topnav a:hover{
  color:#38bdf8;
}

.topnav .title{
  font-size:13px;
  font-weight:700;
  color:#94a3b8;
  letter-spacing:1px;

}

#uploadTerakhir{
  font-size:14px;
  font-weight:600;
  line-height:1.4;
}

</style>
</head>

<body>
<div class="blob one"></div>
<div class="blob two"></div>

<div class="topnav">
  <a href="index.html">← Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">

<div class="card">
<h1>EMSKK INVOICE OVERVIEW</h1>
<div class="subtitle">Weekly invoice submission summary</div>

<select id="searchEMS" placeholder="Cari nama EMS..."></select>

<div class="stats">
<div class="stat">
<div class="stat-title">Jumlah Invoice Minggu Ini</div>
<div class="stat-value" id="jumlahInvoice">0</div>
</div>
<div class="stat">
<div class="stat-title">Total Invoice Minggu Ini</div>
<div class="stat-value" id="totalGaji">$KK 0</div>
</div>
<div class="stat">
<div class="stat-title">Upload Terakhir</div>
<div class="stat-value" id="uploadTerakhir">-</div>
</div>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Invoice</th>
<th>Qty</th>
<th>Total</th>
<th>Bukti</th>
</tr>
</thead>
<tbody id="tbody">
<tr>
<td colspan="5" class="empty">Pilih EMS terlebih dahulu</td>
</tr>
</tbody>
</table>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let allInvoices = [];
let tomSelectInstance = null;
const CACHE_KEY_INV = "invoice_cache_v1";
const CACHE_TTL = 1000 * 60 * 8;

function isCacheValid(time){
  return (Date.now() - time) < CACHE_TTL;
}

async function loadEMS(){
    const res = await fetch(SCRIPT_URL+"?action=getEMS");
    const data = await res.json();
    const select = document.getElementById("searchEMS");

    data.forEach(item=>{
        const opt = document.createElement("option");
        opt.value = item.nama;
        opt.textContent = item.nama;
        select.appendChild(opt);
    });

    tomSelectInstance = new TomSelect("#searchEMS",{
        create:false,
        sortField:{field:"text",direction:"asc"},
        placeholder:"Cari nama EMS...",
		dropdownParent: "body",
        onChange: function(value){
          localStorage.setItem("ems_name", value);
          requestAnimationFrame(() => renderTable());
        }
    });

    const saved = localStorage.getItem("ems_name");

    if (saved) {
      setTimeout(() => {
        tomSelectInstance.setValue(saved);
        requestAnimationFrame(() => renderTable());
      }, 100);
    }
    loadData();
}

async function loadData(){
    const cached = localStorage.getItem(CACHE_KEY_INV);

    if(cached){

        let parsed = null;

        try {
            parsed = JSON.parse(cached);
        } catch(e){
            localStorage.removeItem(CACHE_KEY_INV);
        }

        if(parsed && isCacheValid(parsed.time)){
            allInvoices = parsed.data || [];
            requestAnimationFrame(() => renderTable());

            refreshFromServer();
            return;
        }
    }

    try {
        const res = await fetch(SCRIPT_URL+"?action=getInvoices");
        const data = await res.json();

        allInvoices = data || [];

        localStorage.setItem(CACHE_KEY_INV, JSON.stringify({
            data: allInvoices,
            time: Date.now()
        }));

    } catch(e){
        console.error("Gagal fetch invoice:", e);
        allInvoices = [];
    }

    requestAnimationFrame(() => renderTable());
}

async function refreshFromServer(){
    try{
        const res = await fetch(SCRIPT_URL+"?action=getInvoices");
        const fresh = await res.json();

        allInvoices = fresh;

        localStorage.setItem(CACHE_KEY_INV, JSON.stringify({
            data: fresh,
            time: Date.now()
        }));

        requestAnimationFrame(() => renderTable());

    } catch(e){
        console.log("sync gagal, pakai cache");
    }
}

function getWeekRange(date){
    const d = new Date(date);

    const day = d.getDay();
    const start = new Date(d);
    start.setDate(d.getDate() - day);
    start.setHours(0,0,0,0);

    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23,59,59,999);

    return { start, end };
}

function safeDate(val){
  return new Date(String(val || "").split(" ")[0]);
}

function renderTable(){
    if(!allInvoices || allInvoices.length === 0) return;
	
	const name = (tomSelectInstance?.getValue() || "").toLowerCase().trim();

    if(!name){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5" class="empty">Pilih EMS terlebih dahulu</td></tr>`;
        return;
    }

    const filtered = allInvoices.filter(i =>
	 (i["Nama"] || "").toLowerCase().trim() === name
	);
	
    if(filtered.length===0){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5" class="empty">Belum ada invoice</td></tr>`;
        return;
    }
	
	const today = new Date();
	const { start, end } = getWeekRange(today);
	
const weekInvoices = filtered.filter(i => {

	const t = safeDate(i["Tanggal Invoice"]);

    return t >= start && t <= end;

});

document.getElementById("jumlahInvoice").innerText =
weekInvoices.length;

document.getElementById("totalGaji").innerText =
"$KK " + weekInvoices
    .reduce((a,b)=>a+(Number(b["Total"])||0),0)
    .toLocaleString("id-ID");
	
	const last = filtered
	 .filter(i => i["Tanggal Invoice"])
	 .sort((a, b) =>
	  safeDate(b["Tanggal Invoice"]) - safeDate(a["Tanggal Invoice"])
	 )[0];
	
	document.getElementById("uploadTerakhir").innerText =
	last
	? last["Tanggal Invoice"] + " - " + last["Jenis Invoice"]
	: "-";
	
	document.getElementById("tbody").innerHTML = weekInvoices.map(i=>`
        <tr>
			<td>${safeDate(i["Tanggal Invoice"]).toLocaleDateString("id-ID")}</td>
			<td>${i["Jenis Invoice"]}</td>
            <td>${i["Qty"]}</td>
            <td>$KK ${Number(i["Total"]).toLocaleString("id-ID")}</td>
            <td><a href="${i["Bukti"]}" target="_blank">Lihat</a></td>
        </tr>
    `).join("");
}

document.addEventListener("DOMContentLoaded",loadEMS);
</script>
</body>
</html>
