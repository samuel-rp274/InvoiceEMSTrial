<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Invoice System</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --input:#334155;
    --primary:#dc2626;
    --text:#f8fafc;
    --muted:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:30px;}
.container{max-width:800px;margin:auto;}
.card{background:var(--card);padding:24px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.3);}
h1{margin-bottom:5px;}
.subtitle{color:var(--muted);margin-bottom:25px;}
.form-group{margin-bottom:18px;}
label{display:block;margin-bottom:8px;font-weight:600;}
input,select{width:100%;padding:12px;border:none;border-radius:12px;background:var(--input);color:white;font-size:14px;}
input[readonly]{opacity:.8;}
.hidden{display:none;}
.total{margin-top:20px;padding:15px;background:#111827;border-radius:12px;font-size:22px;font-weight:700;}
button{margin-top:20px;width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:white;font-weight:700;cursor:pointer;}
button:hover{opacity:.9;}
#status{text-align:center;margin-top:15px;font-weight:600;}
.ts-wrapper.single .ts-control{background: var(--input) !important;border: none !important;color: white !important;border-radius: 12px !important;padding: 12px !important;}
.ts-control input{color: white !important;}
.ts-dropdown{background: var(--card) !important;border: none !important;color: white !important;}
.ts-dropdown .option{color: white !important;}
.ts-dropdown .active{background: var(--primary) !important;}
.ts-wrapper.focus .ts-control{box-shadow: 0 0 0 2px rgba(220,38,38,.4) !important;}
</style>
</head>
<body>

<!-- Navbar -->
<div style="display:flex;justify-content:center;margin-bottom:20px;">
    <div style="display:flex;gap:6px;background:#1e293b;padding:6px 12px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.3);">
        <a href="index.html" style="padding:8px 14px;border-radius:12px;text-decoration:none;color:#0f172a;background:#f8fafc;font-weight:700;transition:.2s;"
           onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
           Input
        </a>
        <a href="dashboard.html" style="padding:8px 14px;border-radius:12px;text-decoration:none;color:white;background:#334155;font-weight:600;transition:.2s;"
           onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'">
           Dashboard
        </a>
    </div>
</div>

<div class="container">
<div class="card">
<h1>EMS Invoice System</h1>
<div class="subtitle">Input Invoice EMS</div>

<form id="invoiceForm">
<div class="form-group">
<label>Nama EMS</label>
<select id="nama"></select>
</div>

<div class="form-group">
<label>Jabatan</label>
<input type="text" id="jabatan" readonly>
</div>

<div class="form-group">
<label>Divisi</label>
<input type="text" id="divisi" readonly>
</div>

<div class="form-group">
<label>Tanggal Invoice</label>
<input type="date" id="tanggalInvoice">
</div>

<div class="form-group">
<label>Jenis Invoice</label>
<select id="invoiceType">
  <option value="">Pilih Invoice</option>
  <option value="10000">REVIVE BPJS AREA KOTA - SEKITARNYA</option>
  <option value="15000">REVIVE BPJS PALETO, ROXWOOD, CAYO, LAUT</option>
  <option value="25000">REVIVE BPJS MT. CHILLIAD</option>
  <option value="20000">REVIVE NON BPJS AREA KOTA - SEKITARNYA</option>
  <option value="30000">REVIVE NON BPJS PALETO, ROXWOOD, CAYO, LAUT</option>
  <option value="50000">REVIVE NON BPJS MT. CHILLIAD</option>
  <option value="10000">KTA</option>
  <option value="50000">BPJS</option>
  <option value="50000">MEDICAL CHECKUP</option>
  <option value="operasi">OPERASI</option>
  <option value="surat">SURAT</option>
  <option value="lain">LAIN-LAIN</option>
</select>
</div>

<!-- Sections omitted for brevity (normal, operasi, surat, lain) -->

<div class="form-group"><label>Link Bukti Invoice</label><input type="url" id="bukti"></div>
<div class="total">Total: <span id="total">$KK 0</span></div>
<button type="submit">SIMPAN INVOICE</button>
<div id="status"></div>
</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

const emsData = {};
const nama = document.getElementById("nama");
const jabatan = document.getElementById("jabatan");
const divisi = document.getElementById("divisi");

// Function konversi ke WIB
function toWIB(dateStr){
    const d = new Date(dateStr);
    d.setHours(d.getHours() + 7);
    return d.toISOString().split('T')[0];
}

// Fetch EMS data
fetch(SCRIPT_URL + "?action=getEMS")
.then(res => res.json())
.then(data => {
    data.forEach(item => {
        if(item.nama){
            emsData[item.nama] = { jabatan: item.jabatan||"", divisi: item.divisi||"" };
            const option = document.createElement("option");
            option.value = item.nama;
            option.textContent = item.nama;
            nama.appendChild(option);
        }
    });

    window.tomSelectNama = new TomSelect("#nama", {
        placeholder: "Cari Nama EMS...",
        create: false,
        sortField: { field: "text", direction: "asc" }
    });

    setTimeout(()=>{ tomSelectNama.clear(true); },100);
})
.catch(err => console.error("Gagal load EMS:", err));

nama.addEventListener("change", () => {
    jabatan.value = emsData[nama.value]?.jabatan || "";
    divisi.value = emsData[nama.value]?.divisi || "";
});

// Submit handler
document.getElementById("invoiceForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    if(!nama.value){ status.innerHTML = "⚠️ Pilih Nama EMS"; return; }
    if(!invoiceType.value){ status.innerHTML = "⚠️ Pilih Jenis Invoice"; return; }
    if(!document.getElementById("tanggalInvoice").value){ status.innerHTML = "⚠️ Pilih Tanggal Invoice"; return; }

    const bukti = document.getElementById("bukti").value;
    if(!bukti.includes("discord.com") && !bukti.includes("cdn.discordapp.com")){
        status.innerHTML = "⚠️ Bukti harus link Discord"; return;
    }

    // Hitung harga dan qty sama seperti sebelumnya
    let hargaFinal = 0, qtyFinal = 1;
    if(invoiceType.value==="operasi"){ hargaFinal = Number(hargaOperasi.value)||0; qtyFinal = Number(qtyOperasi.value)||1; }
    else if(invoiceType.value==="surat"){ hargaFinal = Number(hargaSurat.value)||0; qtyFinal = Number(qtySurat.value)||1; }
    else if(invoiceType.value==="lain"){ hargaFinal = Number(hargaLain.value)||0; qtyFinal = Number(qtyLain.value)||1; }
    else{ hargaFinal = Number(harga.value)||0; qtyFinal = Number(qty.value)||1; }

    const payload = {
        nama: nama.value,
        jabatan: jabatan.value,
        divisi: divisi.value,
        tanggalInvoice: toWIB(document.getElementById("tanggalInvoice").value),
        jenisInvoice: invoiceType.options[invoiceType.selectedIndex].text,
        jenisOperasi: document.getElementById("jenisOperasi")?.value || "",
        rawatInap: document.getElementById("rawatInap")?.value || "",
        pembayaran: document.getElementById("pembayaran")?.value || "",
        jenisSurat: document.getElementById("jenisSurat")?.value || "",
        keterangan: document.getElementById("deskripsiLain")?.value || "",
        harga: hargaFinal,
        qty: qtyFinal,
        total: hargaFinal*qtyFinal,
        bukti: bukti||""
    };

    status.innerHTML = "⏳ Mengirim...";
    try{
        const yakin = confirm(`Nama: ${nama.value}\nInvoice: ${invoiceType.options[invoiceType.selectedIndex].text}\nTotal: $KK ${hargaFinal*qtyFinal}\nLanjut simpan?`);
        if(!yakin) return;
        await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(payload)});
        status.innerHTML = "✅ Invoice berhasil disimpan";

        setTimeout(() => { status.textContent = ""; },3000);

        // Reset field
        const namaTerpilih = nama.value;
        document.getElementById("tanggalInvoice").value = "";
        document.getElementById("invoiceType").value = "";
        document.getElementById("bukti").value = "";
        normalSection.classList.remove("hidden");
        operasiSection.classList.add("hidden");
        suratSection.classList.add("hidden");
        lainSection.classList.add("hidden");
        harga.value = "";
        qty.value = 1;
        hargaOperasi.value = "";
        qtyOperasi.value = 1;
        hargaSurat.value = "";
        qtySurat.value = 1;
        hargaLain.value = "";
        qtyLain.value = 1;
        jenisOperasi.value = "";
        jenisSurat.value = "";
        deskripsiLain.value = "";
        document.getElementById("total").innerText = "$KK 0";

        tomSelectNama.setValue(namaTerpilih);
        jabatan.value = emsData[namaTerpilih]?.jabatan || "";
        divisi.value = emsData[namaTerpilih]?.divisi || "";
    } catch(err){
        console.error(err);
        status.innerHTML = "❌ Gagal mengirim invoice";
    }
});
</script>
</body>
</html>
