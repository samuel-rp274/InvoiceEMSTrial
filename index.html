<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#0b1220;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:80px;
  overflow-x:hidden;
}

body::after{
  content:"system by Samuel";
  position:fixed;
  bottom:10px;
  left:12px;
  font-size:10px;
  color:rgba(148,163,184,0.25);
  letter-spacing:0.5px;
  pointer-events:none;
  z-index:9999;
}

.blob{
  position:fixed;
  width:420px;
  height:420px;
  border-radius:50%;
  filter: blur(90px);
  opacity:0.35;
  z-index:0;
  animation: float 10s ease-in-out infinite;
}

.blob.one{background:#38bdf8; top:-120px; left:-120px;}
.blob.two{background:#22c55e; bottom:-140px; right:-140px; animation-delay:2s;}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(30px)}
}

.container{
  width:100%;
  max-width:600px;
  padding:0 16px;
  z-index:2;
  text-align:center;
}

h1{
  font-size:30px;
  font-weight:700;
}

p{
  color:#94a3b8;
  margin-bottom:24px;
  font-size:13px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* CARD */
.card{
  padding:22px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  cursor:pointer;
  transition:0.25s ease;
  text-align:left;
  position:relative;
}

.card:hover{
  transform: translateY(-6px);
  border-color:rgba(56,189,248,0.6);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
  background:#38bdf8;
}

.card.attendance::before { background:#ff4d6d; }
.card.attendancelog::before { background:#facc15; }
.card.invoice::before { background:#22c55e; }
.card.invoicelog::before { background:#00d4ff; }

.icon{font-size:22px; margin-bottom:6px;}
.title{font-size:16px; font-weight:700;}
.desc{font-size:12px; color:#94a3b8; margin-top:4px;}

.card:active{transform:scale(0.98);}

.fab-tutorial{
  position:fixed;
  bottom:20px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  color:#e2e8f0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.2s ease;
  z-index:9998;
}

.fab-tutorial:hover{
  transform:scale(1.08);
  background:rgba(255,255,255,0.12);
}

/* tooltip */
.fab-tutorial::after{
  content:"Tutorial";
  position:absolute;
  right:70px;
  background:#111827;
  color:white;
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  opacity:0;
  transform:translateX(10px);
  transition:0.2s ease;
  pointer-events:none;
  white-space:nowrap;
}

.fab-tutorial:hover::after{
  opacity:1;
  transform:translateX(0);
}
</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>

<div class="container">

  <h1>EMSKK PORTAL</h1>
  <p>Finance Dashboard Navigation Hub</p>

  <div class="menu">

    <div class="card attendance" onclick="go('attendance.html')">
      <div class="icon">🕒</div>
      <div class="title">Attendance</div>
      <div class="desc">Realtime on-duty tracking system</div>
    </div>

    <div class="card attendancelog" onclick="go('attendancelog.html')">
      <div class="icon">⏱</div>
      <div class="title">Attendance Overview</div>
      <div class="desc">Weekly working hours & duty summary</div>
    </div>

    <div class="card invoice" onclick="go('invoice.html')">
      <div class="icon">💳</div>
      <div class="title">Invoice Input</div>
      <div class="desc">Create and upload invoices records</div>
    </div>

    <div class="card invoicelog" onclick="go('invoicelog.html')">
      <div class="icon">📊</div>
      <div class="title">Invoice Overview</div>
      <div class="desc">Weekly invoice submission summary</div>
    </div>

  </div>

</div>

<div class="fab-tutorial" onclick="go('tutorial.html')">
  📚
</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
