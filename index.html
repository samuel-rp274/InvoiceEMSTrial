<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  overflow:hidden;
  color:white;
  padding: 20px;
}

/* BACKGROUND BLUR BLOBS */
.blob{
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(80px);
  opacity:0.4;
  animation: float 8s infinite ease-in-out;
}

.blob.one{
  background:#38bdf8;
  top:-100px;
  left:-100px;
}

.blob.two{
  background:#22c55e;
  bottom:-120px;
  right:-120px;
  animation-delay:2s;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(30px)}
}

/* CONTAINER */
.container{
  width: 100%;
  max-width: 520px;
  padding: 0 20px;
  z-index:2;
  text-align:center;
}

/* TITLE */
h1{
  font-size:30px;
  font-weight:700;
  letter-spacing:1px;
}

p{
  color:#94a3b8;
  margin-bottom:24px;
  font-size:13px;
}

/* MENU GRID */
.menu{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* CARD */
.card{
  padding:22px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  cursor:pointer;
  transition:0.25s ease;
  text-align:left;
  position:relative;
  overflow:hidden;
}

/* HOVER LIFT */
.card:hover{
  transform: translateY(-6px);
  border-color:rgba(56,189,248,0.6);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* LEFT ACCENT LINE */
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
  background:#38bdf8;
}

.card.attendance::before{background:#22c55e;}
.card.invoice::before{background:#facc15;}
.card.dashboard::before{background:#38bdf8;}

/* ICON */
.icon{
  font-size:22px;
  margin-bottom:6px;
}

/* TITLE */
.title{
  font-size:16px;
  font-weight:700;
}

/* DESC */
.desc{
  font-size:12px;
  color:#94a3b8;
  margin-top:4px;
}

/* CLICK EFFECT */
.card:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>

<div class="container">

  <h1>EMSKK PORTAL</h1>
  <p>Internal System Navigation Hub</p>

  <div class="menu">

    <div class="card attendance" onclick="go('attendance.html')">
      <div class="icon">🕒</div>
      <div class="title">Absensi</div>
      <div class="desc">Realtime on-duty tracking system</div>
    </div>

    <div class="card invoice" onclick="go('invoice.html')">
      <div class="icon">💳</div>
      <div class="title">Invoice</div>
      <div class="desc">Create & manage financial records</div>
    </div>

    <div class="card dashboard" onclick="go('dashboard.html')">
      <div class="icon">📊</div>
      <div class="title">Dashboard</div>
      <div class="desc">Analytics & performance overview</div>
    </div>

  </div>

</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
