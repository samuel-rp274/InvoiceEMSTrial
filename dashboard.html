<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard EMS</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --input:#334155;
    --primary:#dc2626;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:30px;}
.container{max-width:1200px;margin:auto;}
.card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:20px;}
h1{margin-bottom:8px;}
.subtitle{color:var(--muted);margin-bottom:20px;}
select,input{width:100%;padding:12px;border:none;border-radius:12px;background:var(--input);color:white;font-size:14px;margin-bottom:15px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:20px;}
.stat{background:#111827;border-radius:15px;padding:20px;}
.stat-title{color:var(--muted);font-size:13px;}
.stat-value{font-size:24px;font-weight:bold;margin-top:8px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#111827;padding:12px;text-align:left;}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);}
tr:hover{background:rgba(255,255,255,.03);}
a{color:#60a5fa;}
.empty{text-align:center;color:var(--muted);padding:30px;}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h1>Dashboard EMS</h1>
<div class="subtitle">Cek invoice yang sudah diupload</div>

<input type="text" id="searchEMS" placeholder="Cari nama EMS...">

<div class="stats">
<div class="stat">
<div class="stat-title">Jumlah Invoice Minggu Ini</div>
<div class="stat-value" id="jumlahInvoice">0</div>
</div>
<div class="stat">
<div class="stat-title">Total Invoice Minggu Ini</div>
<div class="stat-value" id="totalGaji">$KK 0</div>
</div>
<div class="stat">
<div class="stat-title">Upload Terakhir</div>
<div class="stat-value" id="uploadTerakhir">-</div>
</div>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Invoice</th>
<th>Qty</th>
<th>Total</th>
<th>Bukti</th>
</tr>
</thead>
<tbody id="tbody">
<tr>
<td colspan="5" class="empty">Cari EMS terlebih dahulu</td>
</tr>
</tbody>
</table>
</div>

</div>

<script>
const SCRIPT_URL = "URL_APPS_SCRIPT_KAMU";

let allInvoices = [];
let filteredInvoices = [];

async function loadData(){
    try{
        const res = await fetch(SCRIPT_URL+"?action=getInvoices");
        allInvoices = await res.json();
        renderTable();
    }catch(e){
        console.error("Gagal load invoices:", e);
    }
}

function getWeekRange(date){
    const d = new Date(date);
    const day = d.getDay(); // 0 Minggu
    const start = new Date(d);
    start.setDate(d.getDate() - day); // minggu
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    return {start,end};
}

function renderTable(){
    const nameInput = document.getElementById("searchEMS").value.trim().toLowerCase();
    if(!nameInput){
        document.getElementById("tbody").innerHTML = `<tr><td colspan="5" class="empty">Cari EMS terlebih dahulu</td></tr>`;
        document.getElementById("jumlahInvoice").innerText = 0;
        document.getElementById("totalGaji").innerText = "$KK 0";
        document.getElementById("uploadTerakhir").innerText = "-";
        return;
    }

    // Filter nama EMS
    filteredInvoices = allInvoices.filter(i => i["Nama"].toLowerCase().includes(nameInput));

    if(filteredInvoices.length===0){
        document.getElementById("tbody").innerHTML = `<tr><td colspan="5" class="empty">Belum ada invoice</td></tr>`;
        document.getElementById("jumlahInvoice").innerText = 0;
        document.getElementById("totalGaji").innerText = "$KK 0";
        document.getElementById("uploadTerakhir").innerText = "-";
        return;
    }

    // Filter minggu ini
    const now = new Date();
    const {start,end} = getWeekRange(now);

    const weekInvoices = filteredInvoices.filter(i=>{
        const tgl = new Date(i["Tanggal Invoice"]);
        return tgl >= start && tgl <= end;
    });

    const total = weekInvoices.reduce((acc,i)=>acc + (Number(i["Total"])||0),0);
    document.getElementById("jumlahInvoice").innerText = weekInvoices.length;
    document.getElementById("totalGaji").innerText = "$KK "+total.toLocaleString("id-ID");

    // Upload terakhir
    const last = filteredInvoices.reduce((prev,i)=>{
        const d = new Date(i["Tanggal Invoice"]);
        return (!prev || d>prev.date)?{date:d,inv:i}:prev;
    },null);

    document.getElementById("uploadTerakhir").innerText = last?`${last.date.toLocaleDateString('id-ID')} - ${last.inv["Jenis Invoice"]}`:"-";

    // Render tabel
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = weekInvoices.map(i=>`
        <tr>
            <td>${i["Tanggal Invoice"] || "-"}</td>
            <td>${i["Jenis Invoice"] || "-"}</td>
            <td>${i["Qty"] || 0}</td>
            <td>$KK ${(Number(i["Total"])||0).toLocaleString("id-ID")}</td>
            <td><a href="${i["Bukti"]}" target="_blank">Lihat</a></td>
        </tr>
    `).join("");
}

document.getElementById("searchEMS").addEventListener("input", renderTable);

loadData();

</script>
</body>
</html>
