<script>
// Fungsi format tanggal ke WIB tanpa error
function formatTanggalWIB(dateStr){
    if(!dateStr) return "";
    // Jika sudah YYYY-MM-DD
    if(dateStr.length===10) return dateStr;

    // Jika timestamp UTC
    const d = new Date(dateStr);
    return d.toLocaleDateString("sv-SE",{timeZone:"Asia/Jakarta"});
}

function renderTable(){
    const name = tomSelectInstance?.getValue().toLowerCase();

    if(!name){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5" class="empty">Pilih EMS terlebih dahulu</td></tr>`;
        return;
    }

    const filtered = allInvoices.filter(i=>i["Nama"].toLowerCase()===name);

    if(filtered.length===0){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5" class="empty">Belum ada invoice</td></tr>`;
        return;
    }

    const {start,end}=getWeekRange(new Date());

    const week = filtered.filter(i=>{
        const t=new Date(i["Tanggal Invoice"]);
        return t>=start && t<=end;
    });

    document.getElementById("jumlahInvoice").innerText = week.length;
    document.getElementById("totalGaji").innerText =
    "$KK "+week.reduce((a,b)=>a+(Number(b["Total"])||0),0).toLocaleString("id-ID");

    const last = filtered.sort((a,b)=>
        new Date(b["Tanggal Invoice"])-new Date(a["Tanggal Invoice"])
    )[0];

    // Upload Terakhir pakai WIB aman
    document.getElementById("uploadTerakhir").innerText =
        last ? formatTanggalWIB(last["Tanggal Invoice"]) + " - " + last["Jenis Invoice"] : "-";

    document.getElementById("tbody").innerHTML = week.map(i=>`
        <tr>
            <td>${formatTanggalWIB(i["Tanggal Invoice"])}</td>
            <td>${i["Jenis Invoice"]}</td>
            <td>${i["Qty"]}</td>
            <td>$KK ${Number(i["Total"]).toLocaleString("id-ID")}</td>
            <td><a href="${i["Bukti"]}" target="_blank">Lihat</a></td>
        </tr>
    `).join("");
}
</script>
