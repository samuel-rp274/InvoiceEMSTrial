<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EMSKK Total Duty (HRD)</title>

<link rel="icon" href="logo.png" type="image/png">
<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --input:#334155;
  --primary:#dc2626;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px;
}

body::after{
  content:"system by Samuel";
  position:fixed;
  bottom:10px;
  left:12px;
  font-size:10px;
  color:rgba(148,163,184,0.25);
  letter-spacing:0.5px;
  pointer-events:none;
  z-index:9999;
}

.container{
  width:100%;
  max-width:1000px;
  margin-top:60px;
}

h2{
  margin-bottom:20px;
  font-size:22px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
  background:rgba(255,255,255,0.03);
  padding:12px;
  border-radius:16px;
}

input{
  padding:10px;
  border-radius:12px;
  border:none;
  background:var(--input);
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
  opacity:0.9;
}

.info{
  margin:10px 0;
  color:var(--muted);
  font-size:14px;
}

.table-wrap{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#111827;
  padding:14px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

td{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  text-align:center;
}

td:nth-child(2){
  text-align:left;
}

tr:hover td{
  background:rgba(255,255,255,0.03);
}

.rank{
  color:#fbbf24;
  font-weight:700;
}

.topnav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:999;
}

.topnav a{
  color:#cbd5e1;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.topnav a:hover{
  color:#38bdf8;
}

.topnav .title{
  font-size:13px;
  font-weight:700;
  color:#94a3b8;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="topnav">
  <a href="index.html">← Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">

<h2>📊 EMSKK Total Duty (HRD)</h2>

<div class="topbar">
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="generate()">Generate</button>
</div>

<div class="info" id="infoText"></div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Rank</th>
<th>Nama</th>
<th>Total Jam</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let allData = [];

function parseDate(str){
  if(!str) return null;
  return new Date(str.replace(" ","T"));
}

function getDurationHours(s,f){
  const a=parseDate(s);
  const b=parseDate(f);
  if(!a||!b) return 0;
  return (b-a)/(1000*60*60);
}

async function loadData(){
  const res = await fetch(SCRIPT_URL + "?action=getAttendanceLog");
  allData = await res.json() || [];
}

loadData();

function generate(){

  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;

  if(!startVal || !endVal){
    alert("Isi start & end date");
    return;
  }

  const startDate = new Date(startVal + "T00:00:00");
  const endDate = new Date(endVal + "T23:59:59");

  if(startDate > endDate){
    alert("Start harus <= End");
    return;
  }

  const map = {};

  allData.forEach(r=>{
    if(!r.Start || r.Status !== "VALID") return;

    const d = parseDate(r.Start);
    if(!d) return;

    if(d < startDate || d > endDate) return;

    const name = (r.Nama || "").trim();
    if(!name) return;

    const h = getDurationHours(r.Start, r.Finish);

    map[name] = (map[name] || 0) + h;
  });

  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);

  const tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  if(sorted.length === 0){
    tb.innerHTML = `<tr><td colspan="3">Tidak ada data</td></tr>`;
    return;
  }

  sorted.forEach((x,i)=>{
    tb.innerHTML += `
      <tr>
        <td class="rank">${i+1}</td>
        <td>${x[0]}</td>
        <td>${Math.floor(x[1])}h ${(x[1]*60)%60|0}m</td>
      </tr>
    `;
  });

  document.getElementById("infoText").innerText =
    `Total user: ${sorted.length}`;
}
</script>
</body>
</html>
