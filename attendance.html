<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Attendance</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --input:#334155;
  --text:#f8fafc;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#38bdf8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container{
  width:420px;
}

.card{
  background:linear-gradient(145deg,#1e293b,#0f172a);
  border:1px solid #1f2a44;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
  text-align:center;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  margin-bottom:18px;
}

/* CLOCK UPGRADE */
.clock-box{
  text-align:center;
  margin-bottom:18px;
  padding:18px;
  background:#0b1220;
  border-radius:14px;
  border:1px solid #1f2a44;
}

.clock-time{
  font-size:40px;
  font-weight:800;
  color:var(--blue);
  letter-spacing:2px;
}

.clock-date{
  font-size:13px;
  margin-top:6px;
  color:var(--muted);
}

select,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:var(--input);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.85;
}

.start{
  background:var(--green);
}

.finish{
  background:var(--red);
}

.status{
  text-align:center;
  margin-top:14px;
  font-weight:600;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>EMS ABSENSI</h1>
    <div class="subtitle">On Duty Tracking System</div>

    <!-- CLOCK -->
    <div class="clock-box">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">loading...</div>
    </div>

    <select id="nama">
      <option value="">Pilih Nama EMS</option>
    </select>

    <input id="jabatan" placeholder="Jabatan" readonly>
    <input id="divisi" placeholder="Divisi" readonly>

    <button class="start" onclick="startDuty()">START DUTY</button>
    <button class="finish" onclick="finishDuty()">FINISH DUTY</button>

    <div class="status" id="status">Status: -</div>

  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/YOUR_SCRIPT/exec";

let emsData = {};
const nama = document.getElementById("nama");
const jabatan = document.getElementById("jabatan");
const divisi = document.getElementById("divisi");
const status = document.getElementById("status");


// ================= CLOCK =================
function updateClock(){
  const now = new Date();

  const time = now.toLocaleTimeString("id-ID", {
    timeZone:"Asia/Jakarta",
    hour12:false
  });

  const date = now.toLocaleDateString("id-ID", {
    weekday:"long",
    year:"numeric",
    month:"long",
    day:"numeric"
  });

  document.getElementById("clock-time").innerText = time;
  document.getElementById("clock-date").innerText = date;
}

setInterval(updateClock,1000);
updateClock();


// ================= LOAD EMS =================
async function loadEMS(){
  const res = await fetch(API + "?action=getEMS");
  const data = await res.json();

  data.forEach(item=>{
    emsData[item.nama] = {
      jabatan:item.jabatan,
      divisi:item.divisi
    };

    const opt = document.createElement("option");
    opt.value = item.nama;
    opt.textContent = item.nama;
    nama.appendChild(opt);
  });
}

nama.addEventListener("change",()=>{
  jabatan.value = emsData[nama.value]?.jabatan || "";
  divisi.value = emsData[nama.value]?.divisi || "";
});


// ================= START =================
async function startDuty(){
  if(!nama.value){
    status.innerText = "Pilih nama dulu";
    return;
  }

  const res = await fetch(API + "?action=startDuty&nama=" + nama.value);
  const data = await res.json();

  status.innerText = data.message;
}


// ================= FINISH =================
async function finishDuty(){
  if(!nama.value){
    status.innerText = "Pilih nama dulu";
    return;
  }

  const res = await fetch(API + "?action=finishDuty&nama=" + nama.value);
  const data = await res.json();

  if(data.success){
    status.innerText = `${data.message} | Durasi: ${data.duration.toFixed(1)} menit`;
  }else{
    status.innerText = data.message;
  }
}


// ================= INIT =================
loadEMS();
</script>

</body>
</html>
