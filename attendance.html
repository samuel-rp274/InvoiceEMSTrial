<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow-x:hidden;
}

body{
  background:#0b1220;
  color:#fff;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

body{
  overscroll-behavior: none;
}

/* BLOBS (SAMA INDEX) */
.blob{
    position:fixed;
    width:420px;
    height:420px;
    border-radius:50%;
    filter: blur(90px);
    opacity:0.35;
    z-index:0;
    animation: float 10s ease-in-out infinite;
}

.blob.one{
    background:#38bdf8;
    top:-120px;
    left:-120px;
}

.blob.two{
    background:#22c55e;
    bottom:-140px;
    right:-140px;
    animation-delay:2s;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(30px)}
}

/* CONTAINER */
.container{
  width:100%;
  align-items:center;
  max-width:1100px;
  margin:120px auto 40px auto;
  display:flex;
  justify-content:center;
}

/* GLASS CARD (MATCH INDEX) */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:24px;
  width:100%;
  max-width:800px;
  position:relative;
  z-index:2;
}

/* TITLE */
h1{
  text-align:center;
  font-size:26px;
  font-weight:700;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  font-size:13px;
  margin-bottom:18px;
}

/* CLOCK */
.clock-box{
  text-align:center;
  padding:16px;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.06);
}

.clock-time{
  font-size:38px;
  color:#38bdf8;
  font-weight:800;
}

.clock-date{
  font-size:13px;
  color:#94a3b8;
}

/* FORM */
.form-group{
  margin-bottom:14px;
}

label{
  font-size:13px;
  color:#cbd5e1;
  font-weight:600;
  display:block;
  margin-bottom:6px;
}

select,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:translateY(-4px);
}

.start{
  background:#22c55e;
}

.finish{
  background:#ef4444;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:14px;
  padding:10px;
  border-radius:12px;
  font-weight:700;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
  color:#94a3b8;
}

/* TOM SELECT FIX (match UI) */
.ts-wrapper.single .ts-control{
  background:rgba(255,255,255,0.06) !important;
  color:white !important;
  border:none !important;
  border-radius:12px !important;
}

.ts-control input{
  color:white !important;
}

.ts-control{
  color:white !important;
}

/* placeholder */
.ts-control input::placeholder{
  color:#94a3b8 !important;
}

.ts-dropdown{
  background:#0b1220 !important;
  border:1px solid rgba(255,255,255,0.08) !important;
  color:white !important;
}

.topnav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:999;
}

.topnav a{
  color:#cbd5e1;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.topnav a:hover{
  color:#38bdf8;
}

.topnav .title{
  font-size:13px;
  font-weight:700;
  color:#94a3b8;
  letter-spacing:1px;
}
</style>
</head>

<body>
<div class="topnav">
  <a href="index.html">← Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<!-- BLOBS -->
<div class="blob one"></div>
<div class="blob two"></div>

<div class="container">
  <div class="card">

    <h1>EMSKK ATTENDANCE</h1>
    <div class="subtitle">Realtime on-duty tracking system</div>

    <!-- CLOCK -->
    <div class="clock-box">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">loading...</div>
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label>Nama EMS</label>
      <select id="nama">
        <option value="">Cari Nama EMS...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Jabatan</label>
      <input id="jabatan" readonly>
    </div>

    <div class="form-group">
      <label>Divisi</label>
      <input id="divisi" readonly>
    </div>

    <button class="start" onclick="startDuty()">START DUTY</button>
    <button class="finish" onclick="finishDuty()">FINISH DUTY</button>

    <div id="status" class="status badge-off">OFF DUTY</div>

  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let emsData={},ts;
let currentUser=null;
const CACHE_KEY_EMS = "ems_cache_v1";
const CACHE_TTL = 1000 * 60 * 15;

function isCacheValid(time){
  return (Date.now() - time) < CACHE_TTL;
}

setInterval(()=>{
  const now = new Date(
   new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
  );
  document.getElementById("clock-time").innerText=
    now.toLocaleTimeString("id-ID",{hour12:false});
  document.getElementById("clock-date").innerText=
    now.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
},1000);

function setStatus(type,text){
  const el=document.getElementById("status");
  el.className="status";
  el.innerText=text;

  if(type==="on") el.classList.add("badge-on");
  else if(type==="loading") el.classList.add("badge-loading","loading");
  else el.classList.add("badge-off");
}

async function loadEMS(){

  if(ts){
    ts.destroy();
    ts = null;
  }

  const select = document.getElementById("nama");
  select.innerHTML = `<option value="">Cari Nama EMS...</option>`;

  const cached = localStorage.getItem(CACHE_KEY_EMS);

  let emsList = null;

  if(cached){
    try {
      const parsed = JSON.parse(cached);

      if(parsed?.data && Array.isArray(parsed.data) && parsed.data.length){
        emsList = parsed.data;
      }
    } catch(e){
      localStorage.removeItem(CACHE_KEY_EMS);
    }
  }

  if(!emsList){
    try {
      const res = await fetch(API + "?action=getEMS");
      const data = await res.json();

      emsList = Array.isArray(data) ? data : [];

      localStorage.setItem(CACHE_KEY_EMS, JSON.stringify({
        data: emsList,
        time: Date.now()
      }));

    } catch(err){
      console.error("EMS gagal load:", err);
      emsList = [];
    }
  }

  emsList
    .filter(u => u && u.nama)
    .sort((a,b)=>a.nama.localeCompare(b.nama))
    .forEach(u=>{
      emsData[u.nama] = u;

      const opt = document.createElement("option");
      opt.value = u.nama;
      opt.textContent = u.nama;
      select.appendChild(opt);
    });

  ts = new TomSelect("#nama",{
    create:false,
    highlight:true
  });

  ts.on("change",(v)=>{
    currentUser = v;

    if(!v){
      jabatan.value="";
      divisi.value="";
      setStatus("off","OFF DUTY");
      return;
    }

    jabatan.value = emsData[v]?.jabatan || "";
    divisi.value = emsData[v]?.divisi || "";

    checkSession(v);
  });

  restoreSession();  
}

async function checkSession(nama){
  const res=await fetch(API+"?action=getActiveSession&nama="+nama);
  const data=await res.json();

  if(data.active){
    setStatus("on","ON DUTY ACTIVE");
    startTimer(data.startTime);
    document.querySelector(".start").disabled=true;
    document.querySelector(".finish").disabled=false;
  }else{
    setStatus("off","OFF DUTY");
    document.querySelector(".start").disabled=false;
    document.querySelector(".finish").disabled=true;
  }
}

let timer;
function startTimer(start){
  clearInterval(timer);

  timer=setInterval(()=>{
    const now = new Date(
	 new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
	);
	const diff = new Date(now).getTime() - new Date(start).getTime();

    const totalSeconds=Math.floor(diff/1000);

    const hours=Math.floor(totalSeconds/3600);
    const minutes=Math.floor((totalSeconds%3600)/60);
    const seconds=totalSeconds%60;

    const format =
      String(hours).padStart(2,"0") + ":" +
      String(minutes).padStart(2,"0") + ":" +
      String(seconds).padStart(2,"0");

    setStatus("on",`ON DUTY • ${format}`);
  },1000);
}

async function startDuty(){
  if(!currentUser) return;

  setStatus("loading","STARTING...");

  const data = emsData[currentUser];
  if(!data) return;

  try {
    const res = await fetch(
      API +
      "?action=startDuty" +
      "&nama=" + encodeURIComponent(currentUser) +
      "&jabatan=" + encodeURIComponent(data.jabatan || "") +
      "&divisi=" + encodeURIComponent(data.divisi || "")
    );

    const result = await res.json();

    if(!result.success){
      setStatus("off", result.message || "FAILED START DUTY");
      return;
    }

    document.querySelector(".start").disabled = true;
    document.querySelector(".finish").disabled = false;

    await checkSession(currentUser);

  } catch (err) {
    console.error(err);
    setStatus("off","NETWORK ERROR / API FAILED");
  }
}

async function finishDuty(){
  if(!currentUser) return;

  setStatus("loading","FINISHING...");

  const res=await fetch(API+"?action=finishDuty&nama="+currentUser);
  const data=await res.json();
  
  clearInterval(timer);
  timer = null;
  
  setStatus("off",data.message);

  document.querySelector(".start").disabled=false;
  document.querySelector(".finish").disabled=true;
}

function restoreSession(){
  const saved=localStorage.getItem("ems_name");
  if(saved){
    ts.setValue(saved);
    currentUser=saved;
    checkSession(saved);
  }
}

document.addEventListener("change",(e)=>{
  if(e.target.id==="nama"){
    localStorage.setItem("ems_name",e.target.value);
  }
});

loadEMS();
</script>

</body>
</html>
