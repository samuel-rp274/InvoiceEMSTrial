<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#0b1220;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* BLOBS (SAMA INDEX) */
.blob{
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(80px);
  opacity:0.4;
  animation: float 8s infinite ease-in-out;
}

.blob.one{
  background:#38bdf8;
  top:-100px;
  left:-100px;
}

.blob.two{
  background:#22c55e;
  bottom:-120px;
  right:-120px;
  animation-delay:2s;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(30px)}
}

/* CONTAINER */
.container{width:100%;max-width:800px;margin:80px auto 0;}

.container{
  margin-top:60px;
}

/* GLASS CARD (MATCH INDEX) */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:24px;
  width:100%;
}

/* TITLE */
h1{
  text-align:center;
  font-size:26px;
  font-weight:700;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  font-size:13px;
  margin-bottom:18px;
}

/* CLOCK */
.clock-box{
  text-align:center;
  padding:16px;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.06);
}

.clock-time{
  font-size:38px;
  color:#38bdf8;
  font-weight:800;
}

.clock-date{
  font-size:13px;
  color:#94a3b8;
}

/* FORM */
.form-group{
  margin-bottom:14px;
}

label{
  font-size:13px;
  color:#cbd5e1;
  font-weight:600;
  display:block;
  margin-bottom:6px;
}

select,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:translateY(-4px);
}

.start{
  background:#22c55e;
}

.finish{
  background:#ef4444;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:14px;
  padding:10px;
  border-radius:12px;
  font-weight:700;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
  color:#94a3b8;
}

/* TOM SELECT FIX (match UI) */
.ts-wrapper.single .ts-control{
  background:rgba(255,255,255,0.06) !important;
  color:white !important;
  border:none !important;
  border-radius:12px !important;
}

.ts-control input{
  color:white !important;
}

.ts-control{
  color:white !important;
}

/* placeholder */
.ts-control input::placeholder{
  color:#94a3b8 !important;
}

.ts-dropdown{
  background:#0b1220 !important;
  border:1px solid rgba(255,255,255,0.08) !important;
  color:white !important;
}

.topnav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:999;
}

.topnav a{
  color:#cbd5e1;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.topnav a:hover{
  color:#38bdf8;
}

.topnav .title{
  font-size:13px;
  font-weight:700;
  color:#94a3b8;
  letter-spacing:1px;
}
</style>
</head>

<body>
<div class="topnav">
  <a href="index.html">← Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<!-- BLOBS -->
<div class="blob one"></div>
<div class="blob two"></div>

<div class="container">
  <div class="card">

    <h1>EMSKK ATTENDANCE</h1>
    <div class="subtitle">Realtime on-duty tracking system</div>

    <!-- CLOCK -->
    <div class="clock-box">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">loading...</div>
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label>Nama EMS</label>
      <select id="nama">
        <option value="">Cari Nama EMS...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Jabatan</label>
      <input id="jabatan" readonly>
    </div>

    <div class="form-group">
      <label>Divisi</label>
      <input id="divisi" readonly>
    </div>

    <button class="start" onclick="startDuty()">START DUTY</button>
    <button class="finish" onclick="finishDuty()">FINISH DUTY</button>

    <div id="status" class="status badge-off">OFF DUTY</div>

  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let emsData={},ts;
let currentUser=null;

setInterval(()=>{
  const now = new Date(
   new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
  );
  document.getElementById("clock-time").innerText=
    now.toLocaleTimeString("id-ID",{hour12:false});
  document.getElementById("clock-date").innerText=
    now.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
},1000);

function setStatus(type,text){
  const el=document.getElementById("status");
  el.className="status";
  el.innerText=text;

  if(type==="on") el.classList.add("badge-on");
  else if(type==="loading") el.classList.add("badge-loading","loading");
  else el.classList.add("badge-off");
}

async function loadEMS(){
  if (ts) {
	ts.destroy();
  }
  
  const res=await fetch(API+"?action=getEMS");
  const data=await res.json();
  
  nama.innerHTML = `<option value="">Cari Nama EMS...</option>`;

  data
  .sort((a,b)=>a.nama.localeCompare(b.nama))
  .forEach(u=>{
    emsData[u.nama]=u;
	
    let opt=document.createElement("option");
    opt.value=u.nama;
    opt.textContent=u.nama;
    nama.appendChild(opt);
  });

ts=new TomSelect("#nama",{create:false,highlight:true});

ts.on("change",(v)=>{
  currentUser=v;

    if(!v){
      jabatan.value="";
      divisi.value="";
      setStatus("off","OFF DUTY");
      return;
    }

    jabatan.value=emsData[v].jabatan;
    divisi.value=emsData[v].divisi;

    checkSession(v);
  });

  restoreSession();
}

async function checkSession(nama){
  const res=await fetch(API+"?action=getActiveSession&nama="+nama);
  const data=await res.json();

  if(data.active){
    setStatus("on","ON DUTY ACTIVE");
    startTimer(data.startTime);
    document.querySelector(".start").disabled=true;
    document.querySelector(".finish").disabled=false;
  }else{
    setStatus("off","OFF DUTY");
    document.querySelector(".start").disabled=false;
    document.querySelector(".finish").disabled=true;
  }
}

let timer;
function startTimer(start){
  clearInterval(timer);

  timer=setInterval(()=>{
    const now = new Date(
	 new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
	);
	const diff = new Date(now).getTime() - new Date(start).getTime();

    const totalSeconds=Math.floor(diff/1000);

    const hours=Math.floor(totalSeconds/3600);
    const minutes=Math.floor((totalSeconds%3600)/60);
    const seconds=totalSeconds%60;

    const format =
      String(hours).padStart(2,"0") + ":" +
      String(minutes).padStart(2,"0") + ":" +
      String(seconds).padStart(2,"0");

    setStatus("on",`ON DUTY • ${format}`);
  },1000);
}

async function startDuty(){
  if(!currentUser) return;

  setStatus("loading","STARTING...");

  await fetch(API+"?action=startDuty&nama="+currentUser);

  document.querySelector(".start").disabled=true;
  document.querySelector(".finish").disabled=false;

  checkSession(currentUser);
}

async function finishDuty(){
  if(!currentUser) return;

  setStatus("loading","FINISHING...");

  const res=await fetch(API+"?action=finishDuty&nama="+currentUser);
  const data=await res.json();
  
  clearInterval(timer);
  timer = null;
  
  setStatus("off",data.message);

  document.querySelector(".start").disabled=false;
  document.querySelector(".finish").disabled=true;
}

function restoreSession(){
  const saved=localStorage.getItem("ems_name");
  if(saved){
    ts.setValue(saved);
    currentUser=saved;
    checkSession(saved);
  }
}

document.addEventListener("change",(e)=>{
  if(e.target.id==="nama"){
    localStorage.setItem("ems_name",e.target.value);
  }
});

loadEMS();
</script>

</body>
</html>
