<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Attendance</title>

<link rel="icon" href="logo.png" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
}

body {
  background: #030712;
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 100px 20px 40px 20px;
  overscroll-behavior: none;
  position: relative;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
.blob.one { background: #3b82f6; top: -150px; left: -150px; }
.blob.two { background: #22c55e; bottom: -150px; right: -150px; }

.topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  z-index: 999;
}

.topnav a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}

.topnav a:hover {
  color: #38bdf8;
}

.topnav .title {
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.container {
  width: 100%;
  max-width: 600px;
  z-index: 2;
  text-align: center;
}

.card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 36px;
  width: 100%;
  position: relative;
  text-align: left;
}

.card::before {
  content: "";
  position: absolute;
  top: 15%;
  left: 0;
  width: 3px;
  height: 70%;
  border-radius: 4px;
  background: #ef4444;
  box-shadow: 0 0 15px #ef4444;
}

.card-header-icon {
  width: 56px;
  height: 56px;
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: inset 0 0 12px rgba(239, 68, 68, 0.2);
}

h1 {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
h1 span.white { color: #ffffff; }
h1 span.gradient {
  background: linear-gradient(to right, #38bdf8, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 28px;
  line-height: 1.4;
}

.clock-box {
  text-align: center;
  padding: 20px;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 16px;
  margin-bottom: 28px;
  border: 1px solid rgba(255, 255, 255, 0.04);
}

.clock-time {
  font-size: 42px;
  color: #38bdf8;
  font-weight: 800;
  letter-spacing: 1px;
}

.clock-date {
  font-size: 13px;
  color: #64748b;
  margin-top: 4px;
  font-weight: 500;
}

.form-group {
  margin-bottom: 18px;
}

label {
  font-size: 13px;
  color: #94a3b8;
  font-weight: 600;
  display: block;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.04);
  background: rgba(15, 23, 42, 0.6);
  color: white;
  outline: none;
  font-size: 14px;
  transition: all 0.25s;
}

input[readonly] {
  color: #94a3b8;
  background: rgba(15, 23, 42, 0.3);
  cursor: not-allowed;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button:hover {
  transform: translateY(-3px);
}

button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none !important;
}

.start {
  background: #10b981;
  color: white;
  box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
}
.start:hover:not(:disabled) {
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
}

.finish {
  background: #ef4444;
  color: white;
  box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
}
.finish:hover:not(:disabled) {
  box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
}

.status {
  text-align: center;
  margin-top: 20px;
  padding: 12px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: all 0.3s;
}

.ts-wrapper.single .ts-control {
  background: rgba(15, 23, 42, 0.6) !important;
  color: white !important;
  border: 1px solid rgba(255, 255, 255, 0.04) !important;
  border-radius: 14px !important;
  padding: 14px 16px !important;
  font-size: 14px !important;
}

.ts-wrapper.single.focus .ts-control {
  border-color: rgba(56, 189, 248, 0.4) !important;
  box-shadow: 0 0 10px rgba(56, 189, 248, 0.1) !important;
}

.ts-control input { color: white !important; font-size: 14px !important; }
.ts-control { color: white !important; }
.ts-control input::placeholder { color: #64748b !important; }

.ts-dropdown {
  background: #0f172a !important;
  border: 1px solid rgba(255, 255, 255, 0.08) !important;
  color: white !important;
  border-radius: 14px !important;
  margin-top: 6px !important;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
  overflow: hidden !important;
}

.ts-dropdown .option {
  padding: 12px 16px !important;
  font-size: 14px !important;
  cursor: pointer;
}

.ts-dropdown .active {
  background: rgba(56, 189, 248, 0.15) !important;
  color: #38bdf8 !important;
}

.badge-off { color: #94a3b8; }
.badge-on { 
  color: #10b981; 
  background: rgba(16, 185, 129, 0.06) !important; 
  border-color: rgba(16, 185, 129, 0.2) !important; 
}
.badge-loading { 
  color: #f59e0b; 
  background: rgba(245, 158, 11, 0.06) !important; 
  border-color: rgba(245, 158, 11, 0.2) !important; 
}
</style>
</head>

<body>

<div class="topnav">
  <a href="index.html"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="blob one"></div>
<div class="blob two"></div>

<div class="container">
  <div class="card">

    <div class="card-header-icon">
      <i data-lucide="clock"></i>
    </div>

    <h1><span class="white">EMSKK</span> <span class="gradient">ATTENDANCE</span></h1>
    <div class="subtitle">Realtime on-duty tracking system</div>

    <div class="clock-box">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">loading...</div>
    </div>

    <div class="form-group">
      <label>Nama EMS</label>
      <select id="nama">
        <option value="">Cari Nama EMS...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Jabatan</label>
      <input id="jabatan" readonly>
    </div>

    <div class="form-group">
      <label>Divisi</label>
      <input id="divisi" readonly>
    </div>

    <button class="start" onclick="startDuty()">START DUTY</button>
    <button class="finish" onclick="finishDuty()">FINISH DUTY</button>

    <div id="status" class="status badge-off">OFF DUTY</div>

  </div>
<script>
lucide.createIcons();

const API="https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let emsData={},ts;
let currentUser=null;
const CACHE_KEY_EMS = "ems_cache_v1";
const CACHE_TTL = 1000 * 60 * 15;

function isCacheValid(time){
  return (Date.now() - time) < CACHE_TTL;
}

setInterval(()=>{
  const now = new Date(
   new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
  );
  document.getElementById("clock-time").innerText=
    now.toLocaleTimeString("id-ID",{hour12:false});
  document.getElementById("clock-date").innerText=
    now.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
},1000);

function setStatus(type,text){
  const el=document.getElementById("status");
  el.className="status";
  el.innerText=text;

  if(type==="on") el.classList.add("badge-on");
  else if(type==="loading") el.classList.add("badge-loading","loading");
  else el.classList.add("badge-off");
}

async function loadEMS(){
  if(ts){
    ts.destroy();
    ts = null;
  }

  const select = document.getElementById("nama");
  select.innerHTML = `<option value="">Cari Nama EMS...</option>`;

  const cached = localStorage.getItem(CACHE_KEY_EMS);

  let emsList = null;

  if(cached){
    try {
      const parsed = JSON.parse(cached);

      if(parsed?.data && Array.isArray(parsed.data) && parsed.data.length){
        emsList = parsed.data;
      }
    } catch(e){
      localStorage.removeItem(CACHE_KEY_EMS);
    }
  }

  if(!emsList){
    try {
      const res = await fetch(API + "?action=getEMS");
      const data = await res.json();

      emsList = Array.isArray(data) ? data : [];

      localStorage.setItem(CACHE_KEY_EMS, JSON.stringify({
        data: emsList,
        time: Date.now()
      }));

    } catch(err){
      console.error("EMS gagal load:", err);
      emsList = [];
    }
  }

  emsList
    .filter(u => u && u.nama)
    .sort((a,b)=>a.nama.localeCompare(b.nama))
    .forEach(u=>{
      emsData[u.nama] = u;

      const opt = document.createElement("option");
      opt.value = u.nama;
      opt.textContent = u.nama;
      select.appendChild(opt);
    });

  ts = new TomSelect("#nama",{
    create:false,
    highlight:true
  });

  ts.on("change",(v)=>{
    currentUser = v;

    if(!v){
      jabatan.value="";
      divisi.value="";
      setStatus("off","OFF DUTY");
      return;
    }

    jabatan.value = emsData[v]?.jabatan || "";
    divisi.value = emsData[v]?.divisi || "";

    checkSession(v);
  });

  restoreSession();  
}

async function checkSession(nama){
  const res=await fetch(API+"?action=getActiveSession&nama="+nama);
  const data=await res.json();

  if(data.active){
    setStatus("on","ON DUTY ACTIVE");
    startTimer(data.startTime);
    document.querySelector(".start").disabled=true;
    document.querySelector(".finish").disabled=false;
  }else{
    setStatus("off","OFF DUTY");
    document.querySelector(".start").disabled=false;
    document.querySelector(".finish").disabled=true;
  }
}

let timer;
function startTimer(start){
  clearInterval(timer);

  timer=setInterval(()=>{
    const now = new Date(
	 new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
	);
	const diff = new Date(now).getTime() - new Date(start).getTime();

    const totalSeconds=Math.floor(diff/1000);

    const hours=Math.floor(totalSeconds/3600);
    const minutes=Math.floor((totalSeconds%3600)/60);
    const seconds=totalSeconds%60;

    const format =
      String(hours).padStart(2,"0") + ":" +
      String(minutes).padStart(2,"0") + ":" +
      String(seconds).padStart(2,"0");

    setStatus("on",`ON DUTY • ${format}`);
  },1000);
}

async function startDuty(){
  if(!currentUser) return;

  setStatus("loading","STARTING...");

  const data = emsData[currentUser];
  if(!data) return;

  try {
    const res = await fetch(
      API +
      "?action=startDuty" +
      "&nama=" + encodeURIComponent(currentUser) +
      "&jabatan=" + encodeURIComponent(data.jabatan || "") +
      "&divisi=" + encodeURIComponent(data.divisi || "")
    );

    const result = await res.json();

    if(!result.success){
      setStatus("off", result.message || "FAILED START DUTY");
      return;
    }

    document.querySelector(".start").disabled = true;
    document.querySelector(".finish").disabled = false;

    await checkSession(currentUser);

  } catch (err) {
    console.error(err);
    setStatus("off","NETWORK ERROR / API FAILED");
  }
}

async function finishDuty(){
  if(!currentUser) return;

  setStatus("loading","FINISHING...");

  const res=await fetch(API+"?action=finishDuty&nama="+currentUser);
  const data=await res.json();
  
  clearInterval(timer);
  timer = null;
  
  setStatus("off",data.message);

  document.querySelector(".start").disabled=false;
  document.querySelector(".finish").disabled=true;
}

function restoreSession(){
  const saved=localStorage.getItem("ems_name");
  if(saved){
    ts.setValue(saved);
    currentUser=saved;
    checkSession(saved);
  }
}

document.addEventListener("change",(e)=>{
  if(e.target.id==="nama"){
    localStorage.setItem("ems_name",e.target.value);
  }
});

loadEMS();
</script>
</body>
</html>
