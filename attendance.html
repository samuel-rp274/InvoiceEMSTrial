<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --muted:#94a3b8;
  --text:#f8fafc;
  --blue:#38bdf8;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#facc15;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container{width:420px}

.card{
  background:linear-gradient(145deg,#1e293b,#0f172a);
  border:1px solid #1f2a44;
  border-radius:18px;
  padding:24px;
}

h1{text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:var(--muted);margin-bottom:18px}

/* CLOCK */
.clock-box{
  text-align:center;
  padding:16px;
  background:#0b1220;
  border-radius:14px;
  margin-bottom:18px;
  border:1px solid #1f2a44;
}

.clock-time{font-size:38px;color:var(--blue);font-weight:800}
.clock-date{font-size:13px;color:var(--muted)}

/* FORM */
.form-group{margin-bottom:14px}
label{font-size:13px;color:#cbd5e1;font-weight:600;display:block;margin-bottom:6px}

select,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#334155;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.start{background:var(--green)}
.finish{background:var(--red)}

/* STATUS BADGE */
.status{
  text-align:center;
  margin-top:14px;
  padding:10px;
  border-radius:12px;
  font-weight:700;
  transition:0.3s;
}

.badge-off{background:#1e293b;color:var(--muted)}
.badge-on{background:#064e3b;color:#22c55e}
.badge-loading{background:#1e293b;color:var(--yellow)}
/* LOADING */
.loading{
  position:relative;
}

.loading::after{
  content:"";
  width:12px;
  height:12px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

/* TOM SELECT */
.ts-wrapper.single .ts-control{
  background:#334155 !important;
  color:#fff !important;
  border:none !important;
  border-radius:12px !important;
}
.ts-dropdown{
  background:#1e293b !important;
  color:#fff !important;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>EMS ABSENSI</h1>
    <div class="subtitle">On Duty System</div>

    <!-- CLOCK -->
    <div class="clock-box">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">loading...</div>
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label>Nama EMS</label>
      <select id="nama">
        <option value="">Cari Nama EMS...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Jabatan</label>
      <input id="jabatan" readonly>
    </div>

    <div class="form-group">
      <label>Divisi</label>
      <input id="divisi" readonly>
    </div>

    <button class="start" onclick="startDuty()">START DUTY</button>
    <button class="finish" onclick="finishDuty()">FINISH DUTY</button>

    <div id="status" class="status badge-off">OFF DUTY</div>

  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let emsData={},ts;
let currentUser=null;

// CLOCK
setInterval(()=>{
  const now = new Date(
   new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" })
  );
  document.getElementById("clock-time").innerText=
    now.toLocaleTimeString("id-ID",{hour12:false});
  document.getElementById("clock-date").innerText=
    now.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
},1000);

// STATUS UI
function setStatus(type,text){
  const el=document.getElementById("status");
  el.className="status";
  el.innerText=text;

  if(type==="on") el.classList.add("badge-on");
  else if(type==="loading") el.classList.add("badge-loading","loading");
  else el.classList.add("badge-off");
}

// LOAD EMS
async function loadEMS(){
  const res=await fetch(API+"?action=getEMS");
  const data=await res.json();

  data.forEach(u=>{
    emsData[u.nama]=u;
    let opt=document.createElement("option");
    opt.value=u.nama;
    opt.textContent=u.nama;
    nama.appendChild(opt);
  });

  ts=new TomSelect("#nama",{create:false,highlight:true});

  ts.on("change",(v)=>{
    currentUser=v;

    if(!v){
      jabatan.value="";
      divisi.value="";
      setStatus("off","OFF DUTY");
      return;
    }

    jabatan.value=emsData[v].jabatan;
    divisi.value=emsData[v].divisi;

    checkSession(v);
  });

  restoreSession();
}

// SESSION CHECK
async function checkSession(nama){
  const res=await fetch(API+"?action=getActiveSession&nama="+nama);
  const data=await res.json();

  if(data.active){
    setStatus("on","ON DUTY ACTIVE");
    startTimer(data.startTime);
    document.querySelector(".start").disabled=true;
    document.querySelector(".finish").disabled=false;
  }else{
    setStatus("off","OFF DUTY");
    document.querySelector(".start").disabled=false;
    document.querySelector(".finish").disabled=true;
  }
}

// TIMER
let timer;
function startTimer(start){
  clearInterval(timer);

  timer=setInterval(()=>{
    const now = new Date(
	 new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" })
	);
	const diff = new Date(now).getTime() - new Date(start).getTime();

    const totalSeconds=Math.floor(diff/1000);

    const hours=Math.floor(totalSeconds/3600);
    const minutes=Math.floor((totalSeconds%3600)/60);
    const seconds=totalSeconds%60;

    const format =
      String(hours).padStart(2,"0") + ":" +
      String(minutes).padStart(2,"0") + ":" +
      String(seconds).padStart(2,"0");

    setStatus("on",`ON DUTY • ${format}`);
  },1000);
}

// START
async function startDuty(){
  if(!currentUser) return;

  setStatus("loading","STARTING...");

  await fetch(API+"?action=startDuty&nama="+currentUser);

  document.querySelector(".start").disabled=true;
  document.querySelector(".finish").disabled=false;

  checkSession(currentUser);
}

// FINISH
async function finishDuty(){
  if(!currentUser) return;

  setStatus("loading","FINISHING...");

  const res=await fetch(API+"?action=finishDuty&nama="+currentUser);
  const data=await res.json();
  
  clearInterval(timer);
  timer = null;
  
  setStatus("off",data.message);

  document.querySelector(".start").disabled=false;
  document.querySelector(".finish").disabled=true;
}

// RESTORE
function restoreSession(){
  const saved=localStorage.getItem("ems_name");
  if(saved){
    ts.setValue(saved);
    currentUser=saved;
    checkSession(saved);
  }
}

// SAVE NAME
document.addEventListener("change",(e)=>{
  if(e.target.id==="nama"){
    localStorage.setItem("ems_name",e.target.value);
  }
});

loadEMS();
</script>

</body>
</html>
