<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Attendance Overview</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --input:#334155;
    --primary:#22c55e;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Inter,sans-serif;
}

body{
  background:#0b1220;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
}

.container{
  width:100%;
  max-width:1100px;
  margin:80px auto 0;
  padding:40px 16px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:24px;
  margin-bottom:20px;
  position: relative;
  z-index: 1;
  overflow: visible !important;
}

h1{margin-bottom:8px;}
.subtitle{color:var(--muted);margin-bottom:20px;}

select{
    width:100%;
    padding:12px;
    border-radius:12px;
    background:var(--input);
    color:white;
    margin-bottom:15px;
}

/* stats */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.stat{
    background:#111827;
    border-radius:15px;
    padding:20px;
}

.stat-title{color:var(--muted);font-size:13px;}
.stat-value{font-size:22px;font-weight:bold;margin-top:8px;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    position: relative;
    z-index: 1;
}

th{
    background:#111827;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.empty{text-align:center;color:var(--muted);padding:30px;}

.topnav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:999;
}

.topnav a{
  color:#cbd5e1;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.topnav a:hover{
  color:#38bdf8;
}

.topnav .title{
  font-size:13px;
  font-weight:700;
  color:#94a3b8;
  letter-spacing:1px;
}

.blob{
    position:fixed;
    width:420px;
    height:420px;
    border-radius:50%;
    filter: blur(90px);
    opacity:0.35;
    z-index:0;
    animation: float 10s ease-in-out infinite;
}

.blob.one{
    background:#38bdf8;
    top:-120px;
    left:-120px;
}

.blob.two{
    background:#22c55e;
    bottom:-140px;
    right:-140px;
    animation-delay:2s;
}

.ts-wrapper {
    background: #1e293b !important;
    border-radius: 999px !important;
    position: relative;
    z-index: 9999;
}

.ts-control {
    background: #1e293b !important;
    color: #f8fafc !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 999px !important;
    padding: 10px 14px !important;
}

.ts-control input {
    background: transparent !important;
    color: #f8fafc !important;
}

.ts-control.focus {
    background: #1e293b !important;
}

.ts-dropdown {
    background: #111827 !important;
    color: #f8fafc !important;
    border: fixed !important;
	position: absolute !important;
    z-index: 999999 !important;
}

.ts-dropdown .option {
    color: #f8fafc !important;
}

.ts-dropdown .active {
    background: #334155 !important;
}

.search-wrap{
    margin-bottom: 24px;
}

</style>
</head>

<body>
<div class="blob one"></div>
<div class="blob two"></div>

<div class="topnav">
  <a href="index.html">← Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">

<!-- HEADER -->
<div class="card">
<h1>EMSKK ATTENDANCE OVERVIEW</h1>
<div class="subtitle">Weekly working hours & duty summary</div>

<div class="search-wrap">
    <select id="searchEMS"></select>
</div>

<div class="stats">
<div class="stat">
<div class="stat-title">Total Jam Minggu Ini</div>
<div class="stat-value" id="weekHours">0h</div>
</div>

<div class="stat">
<div class="stat-title">Total Jam Bulan Ini</div>
<div class="stat-value" id="monthHours">0h</div>
</div>

<div class="stat">
<div class="stat-title">Waktu On Duty Terakhir</div>
<div class="stat-value" id="topDuty">-</div>
</div>
</div>

</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Start</th>
<th>Finish</th>
<th>Durasi</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
<td colspan="4" class="empty">Pilih EMS terlebih dahulu</td>
</tr>
</tbody>
</table>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let allData = [];
let ts;
const CACHE_KEY_EMS = "ems_cache_v1";
const CACHE_KEY_ATT = "attendance_cache_v1";
const CACHE_TTL = 1000 * 60 * 5;

function isCacheValid(time){
  return (Date.now() - time) < CACHE_TTL;
}

async function loadEMS(){
  const cached = localStorage.getItem(CACHE_KEY_EMS);

  if(cached){

    let parsed = null;

    try {
      parsed = JSON.parse(cached);
    } catch(e){
      console.warn("Cache EMS rusak, dihapus");
      localStorage.removeItem(CACHE_KEY_EMS);
    }

    if(parsed && isCacheValid(parsed.time)){
      buildEMS(parsed.data || []);
      return;
    }
  }

  try {
    const res = await fetch(SCRIPT_URL + "?action=getEMS");
    const data = await res.json();

    const safeData = data || [];

    localStorage.setItem(CACHE_KEY_EMS, JSON.stringify({
      data: safeData,
      time: Date.now()
    }));

    buildEMS(safeData);

  } catch(e){
    console.error("Gagal fetch EMS:", e);

    const fallback = localStorage.getItem(CACHE_KEY_EMS);

    if(fallback){
      try {
        const parsed = JSON.parse(fallback);
        buildEMS(parsed.data || []);
      } catch(err){
        buildEMS([]);
      }
    } else {
      buildEMS([]);
    }
  }
}

function buildEMS(data){
  const select = document.getElementById("searchEMS");
  select.innerHTML = "";

  data
    .filter(d => d.nama && d.nama.trim().toUpperCase() !== "NAMA")
    .sort((a,b)=>a.nama.localeCompare(b.nama))
    .forEach(d=>{
      let clean = d.nama.trim();

      let opt = document.createElement("option");
      opt.value = clean;
      opt.textContent = clean;

      select.appendChild(opt);
    });

  ts = new TomSelect("#searchEMS",{
    create: false,
    items: [],
    sortField: [{ field: "text", direction: "asc" }],
    placeholder: "Cari nama EMS...",
    dropdownParent: "body",
    onChange: function(value){
      localStorage.setItem("ems_name", value);
      render(value);
    }
  });

  const saved = localStorage.getItem("ems_name");

  if(saved){
    setTimeout(()=>{
      ts.setValue(saved);
      render(saved);
    },100);
  }
}

async function loadData(){
  const cached = localStorage.getItem(CACHE_KEY_ATT);

  if(cached){

    let parsed = null;

    try {
      parsed = JSON.parse(cached);
    } catch(e){
      console.warn("Cache rusak, dihapus");
      localStorage.removeItem(CACHE_KEY_ATT);
    }

    if(parsed && isCacheValid(parsed.time)){
      allData = parsed.data || [];

      requestAnimationFrame(() => render());
      refreshFromServer();

      return;
    }
  }

  try {
    const res = await fetch(SCRIPT_URL + "?action=getAttendanceLog");
    const data = await res.json();

    allData = data || [];

    localStorage.setItem(CACHE_KEY_ATT, JSON.stringify({
      data: allData,
      time: Date.now()
    }));

  } catch(e){
    console.error("Gagal fetch server:", e);
    allData = [];
  }

  render();
}

async function refreshFromServer(){
  try{
    const res = await fetch(SCRIPT_URL+"?action=getAttendanceLog");
    const fresh = await res.json();

    localStorage.setItem(CACHE_KEY_ATT, JSON.stringify({
      data: fresh,
      time: Date.now()
    }));

    allData = fresh;

    requestAnimationFrame(() => {
        render();
    });

  } catch(e){
    console.log("sync gagal, pakai cache");
  }
}

function parseDuration(str){
    if(!str) return 0;

    str = String(str).trim().toLowerCase();

    if(str.includes(":")){
        const p = str.split(":");
        if(p.length === 3){
            return (+p[0]*3600) + (+p[1]*60) + (+p[2]);
        }
    }

    let h = 0, m = 0, s = 0;

    const hMatch = str.match(/(\d+)\s*h/);
    const mMatch = str.match(/(\d+)\s*m/);
    const sMatch = str.match(/(\d+)\s*s/);

    if(hMatch) h = +hMatch[1];
    if(mMatch) m = +mMatch[1];
    if(sMatch) s = +sMatch[1];

    return (h * 3600) + (m * 60) + s;
}

function safeDate(v){
    if(!v) return new Date(0);

    if(v instanceof Date) return v;

    return new Date(v);
}

function getWeekRange(){
    const d = new Date();
    const day = d.getDay();
    const start = new Date(d);
    start.setDate(d.getDate()-day);
    start.setHours(0,0,0,0);

    const end = new Date(start);
    end.setDate(start.getDate()+6);
    end.setHours(23,59,59,999);

    return {start,end};
}

function render(selectedName){	
	const name = (selectedName || ts?.getValue() || "").toString().trim();
	
	console.log("SELECTED:", ts.getValue());
	console.log("NAME:", name);
	console.log("ALL DATA:", allData);
	console.log("SELECTED EMS:", selectedName);
	
    if(!name){
    document.getElementById("tbody").innerHTML =
    `<tr><td colspan="4" class="empty">Pilih EMS terlebih dahulu</td></tr>`;
    return;
	}
	
	const normalize = (s) =>
	  (s || "")
		.toLowerCase()
		.replace(/[^a-z0-9 ]/g,'')
		.replace(/\s+/g,' ')
		.trim();
	
	const filtered = allData.filter(i =>
	  normalize(i["Nama"]) === normalize(name)
	);
	
    const {start,end} = getWeekRange();

    const week = filtered.filter(i=>{
        const t = safeDate(i["Start"]);
		
		console.log("START RAW:", i["Start"]);
		console.log("PARSED:", t);
		
        return t>=start && t<=end;
    });

    let total = 0;
    week.forEach(i=>{
        total += parseDuration(i["Durasi"]);
    });

    const hours = Math.floor(total / 3600);
	const minutes = Math.floor((total % 3600) / 60);

	document.getElementById("weekHours").innerText =
	`${hours}h ${minutes}m`;
		
	const now = new Date();
	const month = filtered.filter(i=>{
		const t = safeDate(i["Start"]);
		return t.getMonth() === now.getMonth() &&
			   t.getFullYear() === now.getFullYear();
	});
	
	let monthTotal = 0;
	month.forEach(i=>{
		monthTotal += parseDuration(i["Durasi"]);
	});

	const mHours = Math.floor(monthTotal / 3600);
	const mMinutes = Math.floor((monthTotal % 3600) / 60);

	document.getElementById("monthHours").innerText =
	`${mHours}h ${mMinutes}m`;
	
	const lastDuty = filtered.length
		? [...filtered]
			.filter(i => i["Finish"])
			.sort((a,b)=>
				safeDate(b["Finish"]) - safeDate(a["Finish"])
        )[0]
    : null;
	
	document.getElementById("topDuty").innerText =
	lastDuty && lastDuty["Finish"]
		? lastDuty["Finish"].replace("T", " ")
		: "-";
	
    document.getElementById("tbody").innerHTML =
	week.length ? week.map(i=>`	
	    <tr>
            <td>${i["Nama"]}</td>
            <td>${i["Start"]}</td>
            <td>${i["Finish"]}</td>
            <td>${i["Durasi"]}</td>
        </tr>
    
	`).join("") : `
	<tr><td colspan="4" class="empty">Tidak ada data minggu ini</td></tr>`;
}

document.addEventListener("DOMContentLoaded", async ()=>{
    await loadEMS();
    await loadData();
});
</script>

</body>
</html>
